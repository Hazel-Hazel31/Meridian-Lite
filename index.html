      // collect timed blocks for this day column, pack overlaps side-by-side
      const wblocks=[];
      eventsForDate(iso).forEach(ev=>{const sm=hm(ev.start),em=Math.max(hm(ev.end),sm+15);
        wblocks.push({kind:"event",sm,em,ev});});
      dayRows(iso).filter(r=>r.start).forEach(({t,p,start,end})=>{const sm=hm(start);
        const em=end&&hm(end)>sm?hm(end):sm+30;
        wblocks.push({kind:"task",sm,em,t,p,start,end,hasDur:!!(end&&hm(end)>sm)});});
      packOverlaps(wblocks).forEach(blk=>{
        const top=(blk.sm-DAY_START*60)/60*HOUR_PX;
        const gw=100/blk.cols, leftPct=blk.col*gw;
        const leftCss="calc(2px + (100% - 4px) * "+(leftPct/100)+")";
        const widthCss="calc((100% - 4px) * "+(gw/100)+" - 2px)";
        if(blk.kind==="event"){const ev=blk.ev;const hh=Math.max(18,(blk.em-blk.sm)/60*HOUR_PX);
          const block=document.createElement("div");block.className="wc-eventblock"+(isPastEvent(ev)?" past":"");
          block.style.top=Math.max(0,top)+"px";block.style.height=hh+"px";
          block.style.left=leftCss;block.style.width=widthCss;block.style.right="auto";
          block.innerHTML=`<b>${ev.start}</b>${esc(ev.title)}`;block._click=()=>openEvent(ev.id);
          enableTimeDrag(block,blk.sm,blk.em-blk.sm,HOUR_PX/60,(newStart)=>{const dur=hm(ev.end)-hm(ev.start);
            ev.start=minsToTime(newStart);ev.end=minsToTime(newStart+dur);touchEvent(ev);});
          col.appendChild(block);
        } else {
          const {t,p,start,end,hasDur}=blk;
          const ev=document.createElement("div");
          ev.className="wc-event"+(t.status==="done"?" done":"")+(hasDur?" hasdur":"")+(isOverdue(t)?" overdue":"");
          ev.style.top=Math.max(0,top)+"px";ev.style.borderLeftColor=p.color;ev.style.background=p.color+"1a";
          ev.style.left=leftCss;ev.style.width=widthCss;ev.style.right="auto";
          if(hasDur)ev.style.height=Math.max(18,(blk.em-blk.sm)/60*HOUR_PX)+"px";
          ev.innerHTML=hasDur?`<b>${start}–${end}</b> ${esc(t.text)}`:`<b>${start}</b> ${esc(t.text)}`;ev.title=p.name;
          ev._click=()=>openTask(t.id);
          enableTimeDrag(ev,blk.sm,hasDur?(blk.em-blk.sm):60,HOUR_PX/60,(newStart)=>{
            const ns=minsToTime(newStart);const sess=(t.sessions||[]).find(s=>s.date===iso&&s.start===start);
            if(sess){sess.start=ns;if(hasDur)sess.end=minsToTime(newStart+(hm(end)-hm(start)));}
            else{t.due_time=ns;if(hasDur)t.do_end=minsToTime(newStart+(hm(end)-hm(start)));}
            touchTask(t);});
          col.appendChild(ev);
        }
      });
      if(iso===todayISO()){const d=new Date();const mins=d.getHours()*60+d.getMinutes();
        if(mins>=DAY_START*60&&mins<=DAY_END*60){const nl=document.createElement("div");nl.className="nowline";
          nl.style.top=((mins-DAY_START*60)/60*HOUR_PX)+"px";col.appendChild(nl);}}
      body.appendChild(col);}
    cal.appendChild(body);
    wrap.appendChild(cal);
  }
  app.replaceChildren(wrap);
}
function renderMonth(){
  const cur=fromISO(db.cursorDate);const y=cur.getFullYear(),m=cur.getMonth();
  const first=new Date(y,m,1);const startOff=(first.getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(y,m+1,0).getDate();
  const wrap=document.createElement("div");wrap.className="timeline";wrap.style.maxWidth="1100px";
  const head=document.createElement("div");head.className="week-head";
  head.innerHTML=`<div class="nav"><button data-d="-1">‹</button><button data-d="1">›</button></div>
    <h2>${first.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2>
    <button class="today-pill">this month</button>`;
  head.querySelectorAll(".nav button").forEach(b=>b.addEventListener("click",()=>{
    db.cursorDate=toISO(new Date(y,m+(+b.dataset.d),1));render();}));
  head.querySelector(".today-pill").addEventListener("click",()=>{db.cursorDate=todayISO();render();});
  wrap.appendChild(head);
  wrap.appendChild(catControlBar());
  const grid=document.createElement("div");grid.className="month-grid";
  const names=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  names.forEach(n=>{const h=document.createElement("div");h.className="month-dayname";h.textContent=n;grid.appendChild(h);});
  // leading blanks
  for(let i=0;i<startOff;i++){const c=document.createElement("div");c.className="month-cell empty";grid.appendChild(c);}
  for(let d=1;d<=daysInMonth;d++){const iso=toISO(new Date(y,m,d));const cell=document.createElement("div");
    cell.className="month-cell"+(iso===todayISO()?" is-today":"");
    cell.innerHTML=`<div class="mc-date">${d}</div>`;
    const evs=eventsForDate(iso);
    const doing=applyCatControls(doingForDate(iso));
    const due=applyCatControls(dueForDate(iso));
    evs.slice(0,1).forEach(ev=>{const e=document.createElement("div");e.className="mc-item mc-evt"+(isPastEvent(ev)?" past":"");
      e.textContent=ev.start+" "+ev.title;e.addEventListener("click",()=>openEvent(ev.id));cell.appendChild(e);});
    const projTag=(p)=>`<span class="mc-proj"><span class="mc-dot" style="background:${p.color}"></span>${esc(p.name)}</span>`;
    if(doing.length){const lab=document.createElement("div");lab.className="mc-zone doing";lab.textContent="▶ DOING";cell.appendChild(lab);
      doing.slice(0,2).forEach(({t,p})=>{const e=document.createElement("div");e.className="mc-item doing"+(t.status==="done"?" done":"");
        e.innerHTML=projTag(p)+`<span class="mc-txt">${(t.due_time?t.due_time+" ":"")+esc(t.text)}</span>`;
        e.addEventListener("click",()=>openTask(t.id));cell.appendChild(e);});}
    if(due.length){const lab=document.createElement("div");lab.className="mc-zone due";lab.textContent="⚑ DUE";cell.appendChild(lab);
      due.slice(0,2).forEach(({t,p})=>{const e=document.createElement("div");e.className="mc-item duemark"+(t.status==="done"?" done":"");
        e.innerHTML=projTag(p)+`<span class="mc-txt">${esc(t.text)}</span>`;
        e.addEventListener("click",()=>openTask(t.id));cell.appendChild(e);});}
    const more=Math.max(0,doing.length-2)+Math.max(0,due.length-2);
    if(more>0){const e=document.createElement("div");e.className="mc-more";e.textContent="+"+more+" more";
      e.addEventListener("click",()=>{db.cursorDate=iso;db.view="day";render();});cell.appendChild(e);}
    cell.querySelector(".mc-date").addEventListener("click",()=>{db.cursorDate=iso;db.view="day";render();});
    grid.appendChild(cell);}
  wrap.appendChild(grid);
  app.replaceChildren(wrap);
}
function esc(s){return(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

document.querySelectorAll(".views button").forEach(b=>b.addEventListener("click",()=>{db.openProject=null;db.view=b.dataset.view;render();}));
document.getElementById("brandHome").addEventListener("click",()=>{db.openProject=null;db.view="projects";render();});

/* ===== PWA ===== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;
  const b=document.getElementById("installBtn");b.style.display="inline-block";
  b.onclick=async()=>{b.style.display="none";deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;};});
function buildManifest(){try{
  const icon='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#23201b"/><rect x="56" y="40" width="80" height="28" rx="8" fill="#9aae9a"/><rect x="56" y="82" width="80" height="28" rx="8" fill="#d98a2b"/><rect x="56" y="124" width="80" height="28" rx="8" fill="#b7ab93"/></svg>');
  const m={name:"Meridian",short_name:"Meridian",start_url:location.href,display:"standalone",background_color:"#f3efe6",theme_color:"#23201b",icons:[{src:icon,sizes:"192x192",type:"image/svg+xml",purpose:"any"}]};
  const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/manifest+json"}));
  document.getElementById("manifestLink").setAttribute("href",url);
}catch(e){}}
function registerSW(){try{
  if(!("serviceWorker"in navigator))return;
  if(location.protocol!=="https:"&&location.hostname!=="localhost")return;
  navigator.serviceWorker.register("sw.js").then(reg=>{
    let reloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{if(reloaded)return;reloaded=true;location.reload();});
    setInterval(()=>reg.update(),60000);
  }).catch(err=>{console.log("SW register failed:",err);});
}catch(e){}}

/* ===== BOOT ===== */
function applyTheme(){const th=localStorage.getItem("chronicle.theme")||"light";
  document.documentElement.setAttribute("data-theme",th);}
document.getElementById("themeBtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  localStorage.setItem("chronicle.theme",cur);document.documentElement.setAttribute("data-theme",cur);});
document.getElementById("notifBtn").addEventListener("click",()=>openNotifSettings());
function openNotifSettings(){
  drawerBody.innerHTML=`
    <div class="field"><label>Push notifications</label>
      <div style="font-size:12px;color:var(--graphite);margin-bottom:8px">Get reminders on your phone for upcoming do-dates and deadlines, even when the app is closed.</div>
      <button id="n_enable" style="background:var(--ink);color:var(--paper);border-color:var(--ink);width:100%">
        ${db.notif.enabled?"✓ Notifications enabled":"Enable notifications"}</button></div>
    <div class="field"><label>Remind me about</label>
      <label class="ncheck"><input type="checkbox" id="n_do" ${db.notif.onDo?"checked":""}> ▶ Do-dates (when to start work)</label>
      <label class="ncheck"><input type="checkbox" id="n_due" ${db.notif.onDue?"checked":""}> ⚑ Due-dates (deadlines)</label></div>
    <div class="field"><label>Lead time</label>
      <select id="n_lead">
        <option value="0" ${db.notif.lead===0?"selected":""}>On the day</option>
        <option value="1" ${db.notif.lead===1?"selected":""}>1 day before</option>
        <option value="2" ${db.notif.lead===2?"selected":""}>2 days before</option>
        <option value="3" ${db.notif.lead===3?"selected":""}>3 days before</option>
        <option value="7" ${db.notif.lead===7?"selected":""}>1 week before</option>
      </select></div>
    <div class="field"><button id="n_test" style="width:100%">Send a test notification now</button></div>`;
  drawerBody.querySelector("#n_enable").addEventListener("click",async()=>{
    if(db.notif.enabled){db.notif.enabled=false;persist();openNotifSettings();return;}
    const ok=await enablePush();if(ok)openNotifSettings();});
  drawerBody.querySelector("#n_do").addEventListener("change",e=>{db.notif.onDo=e.target.checked;persist();syncPushPrefs();});
  drawerBody.querySelector("#n_due").addEventListener("change",e=>{db.notif.onDue=e.target.checked;persist();syncPushPrefs();});
  drawerBody.querySelector("#n_lead").addEventListener("change",e=>{db.notif.lead=+e.target.value;persist();syncPushPrefs();});
  drawerBody.querySelector("#n_test").addEventListener("click",async()=>{
    try{
      if(!("Notification"in window)){alert("This browser has no Notification support.");return;}
      if(Notification.permission!=="granted"){
        const p=await Notification.requestPermission();
        if(p!=="granted"){alert("Notification permission is not granted (currently: "+Notification.permission+").");return;}
      }
      if(!("serviceWorker"in navigator)){alert("No service worker support.");return;}
      const reg=await navigator.serviceWorker.ready;
      await reg.showNotification("Meridian",{
        body:"Test notification — this is how reminders will look.",
        tag:"chronicle-test",
        requireInteraction:false
      });
    }catch(err){alert("Test failed: "+(err&&err.message?err.message:err));}
  });
  document.querySelector(".drawer header b").textContent="Notifications";
  drawer.classList.add("open");drawerBack.style.display="block";
}
document.getElementById("resetBtn").addEventListener("click",async()=>{  if(!confirm("Wipe ALL data on this device AND the server, and start fresh? This cannot be undone."))return;
  if(!confirm("Really wipe everything? Last chance."))return;
  // hard-delete every row on the server, then clear local
  try{
    for(const tbl of ["tasks","projects","categories","arrows","events","bundles","notes"]){
      await fetch(REST+"/"+tbl+"?id=neq.__none__",{method:"DELETE",headers:HEADERS});
    }
  }catch(e){}
  try{localStorage.removeItem(LKEY);localStorage.removeItem("chronicle.seeded");}catch(e){}
  db=emptyLocal();db.lastPull=0;persist();
  location.reload();
});
/* ===== AUTH ===== */
function showLogin(msg){
  const g=document.getElementById("loginGate");g.style.display="flex";
  if(msg)document.getElementById("loginMsg").textContent=msg;}
function hideLogin(){document.getElementById("loginGate").style.display="none";}
document.getElementById("loginBtn").addEventListener("click",async()=>{
  const email=document.getElementById("loginEmail").value.trim();
  if(!email||!email.includes("@")){alert("Enter a valid email.");return;}
  const btn=document.getElementById("loginBtn");btn.textContent="Sending…";btn.disabled=true;
  const{error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:location.href.split("#")[0]}});
  btn.disabled=false;btn.textContent="Email me a sign-in link";
  if(error){alert("Couldn't send link: "+error.message);return;}
  document.getElementById("loginMsg").textContent="Check your email and tap the link. You can close this once you're in.";
});
async function startSession(session){
  AUTH_TOKEN=session.access_token;USER_ID=session.user.id;
  hideLogin();
  if(!window._booted){window._booted=true;runApp();}
  else if(navigator.onLine)syncNow();
}
function addLogoutButton(){
  if(document.getElementById("logoutBtn"))return;
  const b=document.createElement("button");b.className="iconbtn";b.id="logoutBtn";b.title="Sign out";b.textContent="⏻";
  b.addEventListener("click",async()=>{if(!confirm("Sign out? Your data stays synced; you'll need the email link to sign back in."))return;
    await sb.auth.signOut();location.reload();});
  document.querySelector(".topbar").appendChild(b);
}

/* ===== BOOT ===== */
function runApp(){
  applyTheme();
  if(runAutoStatus())persist();
  try{render();}catch(e){const b=document.getElementById("cfgBanner");b.style.display="block";
    b.textContent="Startup error: "+e.message;console.error(e);}
  setSync(navigator.onLine?"syncing":"offline",navigator.onLine?"syncing":"offline · saved locally");
  buildManifest();registerSW();addLogoutButton();
  if(navigator.onLine)syncNow();
  setInterval(()=>{if(USER_ID&&navigator.onLine&&syncState!=="syncing"&&!dragging&&!editingTaskId)syncNow();},30000);
  // re-check auto-status hourly (catches day rollover so "tomorrow" becomes "today")
  setInterval(()=>{if(!dragging&&!editingTaskId&&runAutoStatus()){persist();render();}},3600000);
}
async function boot(){
  applyTheme(); // theme before any paint
  // react to auth state (initial load, magic-link return, sign-out)
  sb.auth.onAuthStateChange((_event,session)=>{
    if(session){startSession(session);}
    else{USER_ID=null;AUTH_TOKEN=SUPABASE_ANON;}
  });
  const{data}=await sb.auth.getSession();
  if(data&&data.session){startSession(data.session);}
  else{showLogin();}
}
boot();
</script>
