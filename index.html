<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#23201b">
<title>Meridian</title>
<link rel="manifest" id="manifestLink">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f8fa;--paper-deep:#eef0f3;--ink:#1a1d21;--graphite:#6b7280;
    --hair:#e3e6ea;--done:#5dcaa5;--live:#e08a1e;--live-soft:#fcf3e2;
    --upcoming:#b9c0c7;--danger:#c0392b;--card:#ffffff;--shadow:rgba(20,23,28,0.07);
    --soon:#5b8fc9;
    --mono:"SFMono-Regular",ui-monospace,"DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  [data-theme="dark"]{
    --paper:#15171a;--paper-deep:#1c1f23;--ink:#e8eaed;--graphite:#9aa0a6;
    --hair:#2c3035;--done:#1d9e75;--live:#e08a1e;--live-soft:#3a2f1a;
    --upcoming:#5f6671;--danger:#e24b4a;--card:#1e2125;--shadow:rgba(0,0,0,0.3);
    --soon:#5b8fc9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--paper);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.45;}
  header.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:12px 22px;
    background:var(--card);backdrop-filter:blur(6px);border-bottom:1px solid var(--hair);}
  .brand{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-0.5px;cursor:pointer;}
  .brand .dot{color:var(--live);}
  .brand small{display:block;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
    color:var(--graphite);margin-top:2px;}
  .views{display:flex;gap:4px;}
  .views button{font-family:var(--mono);font-size:12px;letter-spacing:.5px;border:1px solid transparent;
    background:none;color:var(--graphite);padding:6px 13px;border-radius:999px;cursor:pointer;text-transform:uppercase;}
  .views button:hover{color:var(--ink);}
  .views button.active{background:var(--ink);color:var(--paper);}
  .spacer{flex:1;}
  .sync{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:6px;color:var(--graphite);
    border:1px solid var(--hair);border-radius:999px;padding:5px 11px;background:var(--card);}
  .sync .led{width:8px;height:8px;border-radius:50%;background:var(--graphite);}
  .sync.online .led{background:var(--done);}
  .sync.offline .led{background:var(--upcoming);}
  .sync.syncing .led{background:var(--live);animation:pulse 1s infinite;}
  .sync.error .led{background:var(--danger);}
  @keyframes pulse{50%{opacity:.3;}}
  .iconbtn{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    color:var(--graphite);padding:6px 12px;border-radius:7px;cursor:pointer;}
  .iconbtn:hover{border-color:var(--graphite);color:var(--ink);}
  #installBtn{display:none;border-color:var(--live);color:var(--live);}
  main{padding:22px;}

  /* ---- projects overview ---- */
  .board{display:flex;gap:20px;align-items:flex-start;overflow-x:auto;padding-bottom:18px;}
  .totem{flex:0 0 290px;background:var(--card);border:1px solid var(--hair);border-radius:14px;
    box-shadow:0 1px 0 var(--shadow),0 10px 24px -18px var(--shadow);display:flex;flex-direction:column;min-height:220px;}
  .totem.add{background:transparent;border-style:dashed;align-items:center;justify-content:center;
    color:var(--graphite);cursor:pointer;min-height:220px;font-family:var(--mono);font-size:13px;}
  .totem.add:hover{border-color:var(--live);color:var(--live);}
  .totem-head{padding:14px 16px 12px;border-bottom:1px solid var(--hair);position:relative;}
  .totem-head .swatch{position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 3px 3px 0;}
  .totem-head h3{margin:0 0 6px 8px;font-size:16px;letter-spacing:-0.2px;padding-right:46px;word-break:break-word;cursor:pointer;}
  .progress{margin-left:8px;height:5px;border-radius:3px;background:var(--paper-deep);overflow:hidden;}
  .progress>i{display:block;height:100%;background:var(--done);transition:width .3s ease;}
  .totem-meta{margin:6px 0 0 8px;font-family:var(--mono);font-size:11px;color:var(--graphite);display:flex;gap:10px;}
  .open-proj{position:absolute;right:34px;top:12px;border:none;background:none;cursor:pointer;color:var(--graphite);
    font-size:14px;padding:2px;}
  .open-proj:hover{color:var(--live);}
  .delproj{position:absolute;right:12px;top:12px;border:none;background:none;cursor:pointer;color:var(--hair);
    font-size:16px;line-height:1;padding:2px;}
  .delproj:hover{color:var(--danger);}
  .stack{padding:10px 14px 16px;display:flex;flex-direction:column;gap:4px;}
  .zone-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--graphite);
    margin:10px 0 4px;display:flex;align-items:center;gap:8px;}
  .zone-label::after{content:"";flex:1;height:1px;background:var(--hair);}
  .zone-label.first{margin-top:2px;}
  .zone-label.zl-upcoming{color:#7a6fb0;font-weight:600;}
  .zone-label.zl-live{color:#BA7517;font-weight:600;}
  .task.upcoming{opacity:.82;}
  .task{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:9px;font-size:13.5px;
    border:1px solid transparent;position:relative;cursor:pointer;}
  .task:hover{background:var(--paper);}
  .task .tick{flex:0 0 16px;height:16px;margin-top:1px;border-radius:5px;border:1.5px solid var(--graphite);
    cursor:pointer;position:relative;}
  .task .label{flex:1;}
  .task .meta-dot{font-family:var(--mono);font-size:10px;color:var(--graphite);white-space:nowrap;margin-top:2px;}
  .task.done{color:var(--graphite);}
  .task.done .tick{background:var(--done);border-color:var(--done);}
  .task.done .tick::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;
    border:solid var(--card);border-width:0 2px 2px 0;transform:rotate(45deg);}
  .task.done .label{text-decoration:line-through;text-decoration-color:var(--done);}
  .task.live{background:var(--live-soft);}
  .task.live .tick{border-color:var(--live);}
  .task.live .label{font-weight:600;}
  .task.upcoming .tick{border-color:var(--upcoming);border-style:dashed;}
  .addtask{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--graphite);border:1px dashed var(--hair);
    background:none;border-radius:8px;padding:6px;cursor:pointer;width:100%;text-align:left;}
  .addtask:hover{border-color:var(--live);color:var(--live);}

  /* ---- project detail / canvas ---- */
  .detail-head{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .detail-head .back{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--graphite);}
  .detail-head .back:hover{border-color:var(--ink);color:var(--ink);}
  .detail-head h2{font-size:22px;margin:0;letter-spacing:-0.3px;}
  .detail-head h2[contenteditable]:focus{outline:none;border-bottom:1px dashed var(--live);}
  .detail-sub{font-family:var(--mono);font-size:11px;color:var(--graphite);margin:0 0 14px 0;display:flex;gap:14px;align-items:center;}
  .canvas-tools{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .canvas-tools button{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    border-radius:8px;padding:7px 13px;cursor:pointer;color:var(--graphite);}
  .canvas-tools button:hover{border-color:var(--live);color:var(--live);}
  .canvas{position:relative;width:100%;height:calc(100vh - 230px);min-height:460px;border:1px solid var(--hair);
    border-radius:14px;background:
      radial-gradient(circle, rgba(35,32,27,0.06) 1px, transparent 1px) 0 0/22px 22px,
      var(--card);
    overflow:hidden;touch-action:none;}
  .world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  .band{pointer-events:none;}
  .band-label{position:absolute;left:12px;top:8px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;}
  .arrowlayer{position:absolute;left:0;top:0;pointer-events:none;z-index:2;overflow:visible;}
  .ccard{position:absolute;width:210px;background:var(--paper);border:1px solid var(--hair);border-radius:12px;
    box-shadow:0 6px 16px -10px var(--shadow);padding:10px 12px;cursor:grab;user-select:none;border-left:4px solid var(--upcoming);z-index:3;}
  .ccard.dragging{cursor:grabbing;box-shadow:0 14px 30px -12px rgba(35,32,27,0.4);z-index:6;}
  .ccard.live{border-left-color:var(--live);background:var(--live-soft);}
  .ccard.done{border-left-color:var(--done);opacity:.82;}
  .ccard.arrowtarget{outline:2px dashed var(--live);outline-offset:2px;cursor:crosshair;}
  .ccard.arrowsource{outline:2px solid var(--live);outline-offset:2px;}
  .ccard.selected{outline:2px solid var(--live);outline-offset:2px;}
  .ccard.merge-hover,.bundle.merge-hover{outline:2px dashed var(--live);outline-offset:3px;}
  .ccard .ct{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:6px;word-break:break-word;}
  .ccard.done .ct{text-decoration:line-through;color:var(--graphite);}
  .ccard .cmeta{font-family:var(--mono);font-size:10px;color:var(--graphite);display:flex;flex-wrap:wrap;gap:6px;}
  .ccard .cmeta .chip{background:var(--paper-deep);border-radius:5px;padding:1px 5px;}
  .ccard .cstatus{position:absolute;top:8px;right:8px;width:14px;height:14px;border-radius:4px;border:1.5px solid var(--graphite);cursor:pointer;}
  .ccard.done .cstatus{background:var(--done);border-color:var(--done);}
  .ccard.live .cstatus{border-color:var(--live);}
  .canvas.zoomed-out .ccard .cmeta{display:none;}
  .zoomctl{position:absolute;right:12px;bottom:12px;z-index:20;display:flex;align-items:center;gap:6px;
    background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:5px 8px;box-shadow:0 4px 14px -8px var(--shadow);}
  .zoomctl button{font-family:var(--mono);font-size:13px;border:1px solid var(--hair);background:var(--paper);
    border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--graphite);}
  .zoomctl input[type=range]{width:90px;}
  .selbar{position:absolute;left:12px;bottom:12px;z-index:20;display:flex;align-items:center;gap:8px;
    background:var(--ink);color:var(--paper);border-radius:10px;padding:7px 12px;font-family:var(--mono);font-size:12px;}
  .selbar button{font-family:var(--mono);font-size:11px;border:1px solid var(--paper);background:transparent;color:var(--paper);
    border-radius:6px;padding:4px 10px;cursor:pointer;}
  .selbar #bundleSel{background:var(--paper);color:var(--ink);}
  .bundle{position:absolute;min-width:170px;background:var(--paper-deep);border:1px dashed var(--graphite);
    border-radius:10px;padding:4px;cursor:grab;z-index:2;}
  .bundle.dragging{cursor:grabbing;opacity:.9;z-index:7;}
  .bundle-head{display:flex;align-items:center;gap:8px;padding:6px 8px;}
  .bundle-head .bname{font-size:13px;font-weight:600;cursor:text;flex:1;word-break:break-word;}
  .bundle-head .bcount{font-family:var(--mono);font-size:10px;color:var(--graphite);background:var(--card);border-radius:5px;padding:1px 6px;}
  .bundle-head .btoggle,.bundle-head .bdel{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:13px;padding:2px;}
  .bundle-head .bdel:hover{color:var(--danger);}
  .bundle.expanded{background:rgba(120,120,120,0.06);border-style:solid;min-width:240px;min-height:110px;}
  .bundle-body{display:flex;flex-direction:column;gap:5px;padding:4px 8px 8px;overflow:auto;max-height:calc(100% - 36px);}
  .bmember{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--hair);
    border-left:3px solid var(--upcoming);border-radius:0 7px 7px 0;padding:5px 8px;font-size:12.5px;}
  .bmember.live{border-left-color:var(--live);background:var(--live-soft);}
  .bmember.done{border-left-color:var(--done);opacity:.8;}
  .bmember .bm-tick{flex:0 0 13px;height:13px;border-radius:4px;border:1.5px solid var(--graphite);cursor:pointer;}
  .bmember.done .bm-tick{background:var(--done);border-color:var(--done);}
  .bmember .bm-text{flex:1;cursor:pointer;}
  .bmember.done .bm-text{text-decoration:line-through;color:var(--graphite);}
  .bmember .bm-out{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:12px;}
  .bresize{position:absolute;right:2px;bottom:2px;width:14px;height:14px;cursor:nwse-resize;
    background:linear-gradient(135deg,transparent 50%,var(--graphite) 50%);border-radius:0 0 8px 0;opacity:.5;}

  .cnote{position:absolute;background:var(--card);border:1px solid var(--hair);border-radius:10px;z-index:3;
    box-shadow:0 6px 16px -10px var(--shadow);overflow:hidden;min-width:120px;}
  /* text notes: invisible until hover/edit (PPT-style) */
  .cnote.text{background:transparent;border:1px solid transparent;box-shadow:none;}
  .cnote.text .note-bar{opacity:0;background:transparent;transition:opacity .12s;}
  .cnote.text:hover{border-color:var(--hair);}
  .cnote.text:hover .note-bar{opacity:1;}
  .cnote.text .note-text:focus{outline:1px dashed var(--live);outline-offset:2px;}
  .cnote .note-bar{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:var(--paper-deep);}
  .cnote .note-grip{cursor:grab;color:var(--graphite);font-size:12px;user-select:none;}
  .cnote .note-del{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:15px;line-height:1;}
  .cnote .note-del:hover{color:var(--danger);}
  .cnote.dragging{opacity:.9;z-index:7;}
  .note-text{padding:9px 11px;font-size:13px;outline:none;min-height:40px;white-space:pre-wrap;word-break:break-word;}
  .note-text:empty:before{content:attr(data-ph);color:var(--graphite);opacity:.5;}
  .note-link{display:block;padding:9px 11px;font-size:13px;color:var(--soon);text-decoration:none;word-break:break-all;}
  .note-link:hover{text-decoration:underline;}
  .note-img{display:block;width:100%;height:auto;}
  .note-file{display:flex;gap:6px;align-items:center;padding:11px;font-size:13px;color:var(--ink);text-decoration:none;}
  .note-file:hover{color:var(--soon);}

  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .month-dayname{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--graphite);
    text-align:center;padding:4px 0;}
  .month-cell{min-height:120px;border:1px solid var(--hair);border-radius:8px;background:var(--card);padding:5px;
    display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .month-cell.empty{background:transparent;border:none;}
  .month-cell.is-today{border-color:var(--live);box-shadow:0 0 0 2px var(--live-soft);}
  .month-cell .mc-date{font-family:var(--mono);font-size:12px;color:var(--graphite);cursor:pointer;align-self:flex-start;}
  .month-cell.is-today .mc-date{color:var(--live);font-weight:600;}
  .mc-item{font-size:10.5px;padding:2px 5px;border-radius:4px;border-left:2px solid var(--upcoming);background:var(--paper);
    cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
  .mc-item.done{text-decoration:line-through;opacity:.6;}
  .mc-item.mc-evt{background:rgba(122,108,174,0.13);border-left-color:#7a6cae;color:#3c3489;}
  .mc-more{font-family:var(--mono);font-size:9.5px;color:var(--graphite);cursor:pointer;padding-left:5px;}
  .mc-more:hover{color:var(--live);}
  /* do/due zones + project tags */
  .mc-zone{font-family:var(--mono);font-size:8px;letter-spacing:0.5px;margin:3px 0 1px;}
  .mc-zone.doing{color:#0F6E56;}
  .mc-zone.due{color:#A32D2D;}
  .mc-item.doing{background:#1D9E75;border:none;color:#fff;display:flex;flex-direction:column;}
  .mc-item.duemark{background:#FCEBEB;border:1.5px solid #E24B4A;color:#A32D2D;font-weight:500;display:flex;flex-direction:column;}
  .mc-proj{display:flex;align-items:center;gap:3px;font-size:8px;opacity:0.92;}
  .mc-dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex:0 0 auto;}
  .mc-txt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .w-zone{font-family:var(--mono);font-size:9px;letter-spacing:0.5px;margin:6px 0 2px;}
  .w-zone.doing{color:#0F6E56;}.w-zone.due{color:#A32D2D;}
  .wtask.doing{background:#1D9E75;color:#fff;border-left:none;display:flex;flex-direction:column;gap:1px;}
  .wtask.duemark{background:#FCEBEB;border:1.5px solid #E24B4A;color:#A32D2D;font-weight:500;border-left:1.5px solid #E24B4A;display:flex;flex-direction:column;gap:1px;}
  .wt-proj{display:flex;align-items:center;gap:3px;font-size:9px;opacity:0.9;}
  .agenda-zone{font-family:var(--mono);font-size:10px;letter-spacing:1px;margin:14px 0 4px;padding-left:2px;}
  .agenda-zone.doing{color:#0F6E56;}.agenda-zone.due{color:#A32D2D;}
  .agenda-kind{font-family:var(--mono);font-size:12px;margin-right:2px;}
  .agenda-kind.doing{color:#0F6E56;}.agenda-kind.duemark{color:#A32D2D;}
  .agenda-row.duemark{background:#FCEBEB;}
  .ad-chip.doing{background:#1D9E75;color:#fff;display:inline-flex;align-items:center;gap:4px;border-left:none;}
  .ad-chip.duemark{background:#FCEBEB;border:1.5px solid #E24B4A;color:#A32D2D;font-weight:500;display:inline-flex;align-items:center;gap:4px;}
  .canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    gap:10px;color:var(--graphite);font-family:var(--mono);font-size:13px;pointer-events:none;z-index:1;}

  .capture{max-width:none;display:flex;gap:8px;margin-bottom:16px;}
  .capture input{flex:1;font-family:var(--sans);font-size:14px;border:1px solid var(--hair);border-radius:9px;
    padding:10px 12px;background:var(--card);color:var(--ink);}
  .capture button{font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--paper);border:none;
    border-radius:9px;padding:0 18px;cursor:pointer;}
  .totem.unassigned{border-style:dashed;}
  .totem.unassigned .assign{font-family:var(--mono);font-size:11px;border:1px solid var(--hair);border-radius:6px;
    background:var(--card);color:var(--graphite);max-width:96px;}
  .quickadd{margin-top:6px;width:100%;font-family:var(--sans);font-size:13px;border:1px dashed var(--hair);
    border-radius:8px;padding:7px 9px;background:none;color:var(--ink);}
  .quickadd:focus{outline:none;border-color:var(--live);border-style:solid;}

  .canvas-row{display:flex;gap:14px;align-items:stretch;}
  .canvas-row .canvas{flex:1;}
  .inbox{flex:0 0 220px;border:1px solid var(--hair);border-radius:14px;background:var(--card);display:flex;
    flex-direction:column;max-height:calc(100vh - 230px);}
  .inbox-head{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--graphite);padding:12px 14px;
    border-bottom:1px solid var(--hair);}
  .inbox-body{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
  .inbox-empty{font-family:var(--mono);font-size:11px;color:var(--graphite);text-align:center;padding:20px 6px;line-height:1.5;}
  .inbox-card{border:1px solid var(--hair);border-left:4px solid var(--upcoming);border-radius:0 9px 9px 0;
    padding:8px 10px;background:var(--paper);}
  .inbox-card .ic-t{font-size:13px;font-weight:600;margin-bottom:6px;cursor:pointer;word-break:break-word;}
  .inbox-card .ic-actions{display:flex;gap:4px;}
  .inbox-card .ic-actions button{flex:1;font-family:var(--mono);font-size:10px;border:1px solid var(--hair);
    background:var(--card);border-radius:6px;padding:3px;cursor:pointer;color:var(--graphite);}
  .inbox-card .ic-actions button[data-s="live"]:hover{border-color:var(--live);color:var(--live);}
  .inbox-card .ic-actions button[data-s="done"]:hover{border-color:var(--done);color:#0F6E56;}
  .inbox-add{margin:10px;font-family:var(--sans);font-size:12px;border:1px dashed var(--hair);border-radius:8px;
    padding:7px 9px;background:none;color:var(--ink);}
  .inbox-add:focus{outline:none;border-color:var(--live);border-style:solid;}
  @media (max-width:760px){.canvas-row{flex-direction:column;}.inbox{flex:1 1 auto;max-height:260px;}}

  /* ---- task editor drawer ---- */
  .drawer-back{position:fixed;inset:0;background:rgba(35,32,27,0.3);z-index:40;display:none;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--card);z-index:41;
    box-shadow:-12px 0 40px -16px rgba(0,0,0,.35);transform:translateX(100%);transition:transform .22s ease;
    display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--hair);}
  .drawer header b{font-family:var(--mono);font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--graphite);}
  .drawer header button{border:none;background:none;font-size:22px;cursor:pointer;color:var(--graphite);line-height:1;}
  .drawer header button:hover{color:var(--danger);}
  .drawer .body{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--graphite);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;font-family:var(--sans);font-size:14px;border:1px solid var(--hair);
    border-radius:9px;padding:9px 11px;background:var(--paper);color:var(--ink);}
  .field textarea{resize:vertical;min-height:70px;}
  .field.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .statusseg{display:flex;gap:6px;}
  .statusseg button{flex:1;font-family:var(--mono);font-size:11px;border:1px solid var(--hair);background:var(--paper);
    border-radius:8px;padding:8px;cursor:pointer;color:var(--graphite);text-transform:uppercase;}
  .statusseg button.on[data-s="upcoming"]{background:var(--upcoming);color:#fff;border-color:var(--upcoming);}
  .statusseg button.on[data-s="live"]{background:var(--live);color:#fff;border-color:var(--live);}
  .statusseg button.on[data-s="done"]{background:var(--done);color:#fff;border-color:var(--done);}
  .drawer .foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;}
  .drawer .foot button{font-family:var(--mono);font-size:12px;border-radius:8px;padding:9px 14px;cursor:pointer;border:1px solid var(--hair);background:var(--paper);}
  .drawer .foot .del{color:var(--danger);border-color:var(--danger);}

  /* ---- day / week (unchanged structure) ---- */
  .timeline{max-width:1100px;margin:0 auto;}
  .day-head,.week-head{display:flex;align-items:baseline;gap:14px;margin-bottom:18px;}
  .day-head h2,.week-head h2{font-family:var(--mono);font-size:22px;letter-spacing:-0.5px;margin:0;}
  .nav{display:flex;gap:6px;}
  .nav button{font-family:var(--mono);border:1px solid var(--hair);background:var(--card);width:30px;height:30px;
    border-radius:8px;cursor:pointer;color:var(--graphite);}
  .nav button:hover{border-color:var(--ink);color:var(--ink);}
  .today-pill{font-family:var(--mono);font-size:11px;color:var(--live);border:1px solid var(--live);padding:3px 9px;
    border-radius:999px;cursor:pointer;background:var(--live-soft);}
  .agenda-row{display:flex;gap:12px;padding:11px 4px;border-bottom:1px solid var(--hair);align-items:flex-start;cursor:pointer;}
  .agenda-row .proj-chip{flex:0 0 auto;font-family:var(--mono);font-size:10px;letter-spacing:.5px;padding:3px 8px;
    border-radius:999px;color:#fff;white-space:nowrap;margin-top:2px;}
  .agenda-row .a-tick{flex:0 0 16px;height:16px;margin-top:3px;border-radius:5px;border:1.5px solid var(--graphite);
    cursor:pointer;position:relative;}
  .agenda-row.done .a-tick{background:var(--done);border-color:var(--done);}
  .agenda-row.done .a-tick::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;
    border:solid var(--card);border-width:0 2px 2px 0;transform:rotate(45deg);}
  .agenda-row .a-label{flex:1;font-size:14px;}
  .agenda-row .a-time{font-family:var(--mono);font-size:11px;color:var(--graphite);margin-top:3px;}
  .agenda-row.done .a-label{text-decoration:line-through;color:var(--graphite);}
  .empty{text-align:center;color:var(--graphite);font-family:var(--mono);font-size:13px;padding:40px 0;
    border:1px dashed var(--hair);border-radius:12px;margin-top:8px;}
  .day-add{display:flex;gap:8px;margin-top:16px;}
  .day-add input,.day-add select{font-family:var(--sans);font-size:13px;border:1px solid var(--hair);border-radius:8px;
    padding:8px 10px;background:var(--card);color:var(--ink);}
  .day-add input.task-in{flex:1;}
  .day-add button{font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--paper);border:none;
    border-radius:8px;padding:0 16px;cursor:pointer;}
  .week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
  .wday{border:1px solid var(--hair);border-radius:10px;background:var(--card);min-height:150px;padding:8px;
    display:flex;flex-direction:column;gap:5px;}
  .wday.is-today{border-color:var(--live);box-shadow:0 0 0 2px var(--live-soft);}
  .wday h4{margin:0 0 4px;font-family:var(--mono);font-size:11px;color:var(--graphite);letter-spacing:.5px;
    display:flex;justify-content:space-between;}
  .wday h4 b{color:var(--ink);font-size:14px;}
  .wtask{font-size:11.5px;padding:4px 6px;border-radius:6px;border-left:3px solid var(--upcoming);background:var(--paper);
    cursor:pointer;line-height:1.25;}
  .wtask.done{color:var(--graphite);text-decoration:line-through;opacity:.7;}

  .modetoggle{display:flex;gap:4px;margin-left:auto;}
  .modetoggle button{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.5px;
    border:1px solid var(--hair);background:var(--card);color:var(--graphite);border-radius:7px;padding:5px 11px;cursor:pointer;}
  .modetoggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .day-head,.week-head{align-items:center;}

  .cal{border:1px solid var(--hair);border-radius:12px;overflow:hidden;background:var(--card);}
  .allday{display:flex;border-bottom:1px solid var(--hair);min-height:40px;}
  .allday .ad-label{flex:0 0 64px;font-family:var(--mono);font-size:10px;color:var(--graphite);padding:10px 8px;
    border-right:1px solid var(--hair);}
  .allday .ad-items{flex:1;display:flex;flex-wrap:wrap;gap:6px;padding:8px;}
  .ad-empty{font-family:var(--mono);font-size:11px;color:var(--hair);}
  .ad-chip{font-size:11.5px;padding:3px 8px;border-radius:0 6px 6px 0;border-left:3px solid var(--upcoming);
    background:var(--paper);cursor:pointer;}
  .ad-chip.done{text-decoration:line-through;color:var(--graphite);opacity:.7;}
  .hourgrid{position:relative;}
  .hourline{position:absolute;left:0;right:0;border-top:1px solid var(--hair);}
  .hourline .hourlbl{position:absolute;left:8px;top:-7px;font-family:var(--mono);font-size:10px;color:var(--graphite);background:var(--card);padding:0 4px;}
  .event{position:absolute;left:70px;right:10px;border-left:3px solid var(--upcoming);border-radius:0 6px 6px 0;
    padding:3px 8px;font-size:12px;cursor:pointer;min-height:22px;overflow:hidden;}
  .event b{font-family:var(--mono);font-size:11px;}
  .event.done{text-decoration:line-through;opacity:.65;}
  .event.hasdur,.wc-event.hasdur{align-items:flex-start;display:block;}
  .event.hasdur b,.wc-event.hasdur b{display:block;margin-bottom:2px;}
  .nowline{position:absolute;left:0;right:0;height:2px;background:var(--danger);z-index:5;}
  .nowline::before{content:"";position:absolute;left:0;top:-3px;width:7px;height:7px;border-radius:50%;background:var(--danger);}

  .weekcal{border:1px solid var(--hair);border-radius:12px;overflow:hidden;background:var(--card);}
  .weekcal-hdr,.weekcal-allday{display:grid;grid-template-columns:56px repeat(7,1fr);}
  .weekcal-hdr{border-bottom:1px solid var(--hair);}
  .wc-corner{border-right:1px solid var(--hair);}
  .wc-dayname{font-family:var(--mono);font-size:11px;color:var(--graphite);text-align:center;padding:8px 2px;border-right:1px solid var(--hair);}
  .wc-dayname b{color:var(--ink);font-size:14px;}
  .wc-dayname.is-today{background:var(--live-soft);color:var(--live);}
  .weekcal-allday{border-bottom:1px solid var(--hair);min-height:32px;}
  .wc-adlabel{font-family:var(--mono);font-size:9px;color:var(--graphite);padding:6px 4px;border-right:1px solid var(--hair);}
  .wc-adcell{border-right:1px solid var(--hair);padding:4px;display:flex;flex-direction:column;gap:3px;}
  .wc-adcell .ad-chip{font-size:10.5px;padding:2px 5px;}
  .weekcal-body{display:grid;grid-template-columns:56px repeat(7,1fr);max-height:calc(100vh - 240px);overflow-y:auto;position:relative;}
  .wc-gutter{position:relative;border-right:1px solid var(--hair);}
  .wc-hourlbl{position:absolute;right:6px;top:-7px;font-family:var(--mono);font-size:10px;color:var(--graphite);}
  .wc-col{position:relative;border-right:1px solid var(--hair);}
  .wc-col.is-today{background:rgba(217,138,43,0.03);}
  .wc-hline{position:absolute;left:0;right:0;border-top:1px solid var(--hair);}
  .wc-event{position:absolute;left:2px;right:2px;border-left:3px solid var(--upcoming);border-radius:0 4px 4px 0;
    padding:2px 4px;font-size:10.5px;cursor:pointer;overflow:hidden;min-height:20px;line-height:1.2;}
  .wc-event b{font-family:var(--mono);font-size:9.5px;display:block;}
  .wc-event.done{text-decoration:line-through;opacity:.65;}

  .catbar{display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:14px;}
  .catbar-label{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--graphite);}
  .catchip{font-family:var(--mono);font-size:11px;border:1px solid var(--hair);background:var(--card);color:var(--graphite);
    border-radius:999px;padding:4px 11px;cursor:pointer;}
  .catchip.on{font-weight:600;}
  .catsort,.catclear{font-family:var(--mono);font-size:11px;border:1px solid var(--hair);background:var(--card);
    color:var(--graphite);border-radius:7px;padding:4px 11px;cursor:pointer;}
  .catsort.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .catclear{color:var(--danger);border-color:var(--danger);}

  .cal-eventblock{position:absolute;left:70px;right:10px;background:repeating-linear-gradient(135deg,rgba(122,108,174,0.13) 0 8px,rgba(122,108,174,0.06) 8px 16px);
    border:1px solid #7a6cae;border-radius:6px;padding:3px 8px;font-size:12px;cursor:grab;overflow:hidden;color:#3c3489;z-index:2;}
  .cal-eventblock b{font-family:var(--mono);font-size:11px;}
  .cal-eventblock.dragging{cursor:grabbing;opacity:.85;z-index:8;}
  .wc-eventblock{position:absolute;left:2px;right:2px;background:repeating-linear-gradient(135deg,rgba(122,108,174,0.15) 0 6px,rgba(122,108,174,0.06) 6px 12px);
    border:1px solid #7a6cae;border-radius:4px;padding:2px 4px;font-size:10px;cursor:grab;overflow:hidden;color:#3c3489;z-index:2;line-height:1.2;}
  .wc-eventblock b{font-family:var(--mono);font-size:9px;display:block;}
  .wc-eventblock.dragging{cursor:grabbing;opacity:.85;z-index:8;}
  .event-row .proj-chip.evt,.wtask.wevt{background:#7a6cae !important;color:#fff;}
  .wtask.wevt{border-left-color:#7a6cae;}
  .ccard.eventcard{border-left-color:#7a6cae;background:repeating-linear-gradient(135deg,rgba(122,108,174,0.08) 0 10px,transparent 10px 20px),var(--paper);}
  .ccard .chip.evtchip{background:rgba(122,108,174,0.18);color:#3c3489;}

  .totem.droptarget{border-color:var(--live);box-shadow:0 0 0 3px var(--live-soft);}
  .unassigned-area{margin-top:24px;border:1px dashed var(--hair);border-radius:14px;padding:14px 16px;background:var(--card);}
  .ua-head{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--graphite);margin-bottom:10px;}
  .ua-hint{text-transform:none;letter-spacing:0;color:var(--hair);margin-left:8px;}
  .ua-list{display:flex;flex-wrap:wrap;gap:8px;}
  .ua-card{display:flex;align-items:center;gap:8px;border:1px solid var(--hair);border-left:4px solid var(--upcoming);
    border-radius:0 9px 9px 0;padding:7px 10px;background:var(--paper);cursor:grab;}
  .ua-card.dragging{opacity:.5;}
  .ua-card .ua-text{font-size:13px;font-weight:600;cursor:pointer;}
  .ua-card .assign{font-family:var(--mono);font-size:11px;border:1px solid var(--hair);border-radius:6px;background:var(--card);color:var(--graphite);}
  .ua-card .ua-del{border:none;background:none;color:var(--hair);font-size:15px;cursor:pointer;}
  .ua-card .ua-del:hover{color:var(--danger);}

  .ncheck{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 0;cursor:pointer;}
  .ncheck input{width:16px;height:16px;}
  .esec{border:1px solid var(--hair);border-radius:10px;margin-bottom:10px;overflow:hidden;}
  .esec-h{width:100%;text-align:left;background:var(--card);border:none;padding:10px 12px;font-size:13px;font-weight:600;
    cursor:pointer;display:flex;justify-content:space-between;align-items:center;color:var(--ink);}
  .esec-x{color:var(--graphite);font-size:11px;}
  .esec-b{padding:6px 12px 12px;}
  .sessrow{display:flex;gap:6px;align-items:center;margin-bottom:6px;}
  .sessrow input[type=date]{flex:1.4;min-width:0;}
  .sessrow input[type=time]{flex:1;min-width:0;}
  .sessrow .sessdel{border:none;background:none;color:var(--graphite);font-size:16px;cursor:pointer;padding:0 4px;}
  .sessrow .sessdel:hover{color:var(--danger);}
  .repeat-ov{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
  .repeat-card{background:var(--card);border-radius:14px;padding:18px;max-width:380px;width:100%;max-height:90vh;overflow:auto;}
  .repeat-card h3{margin:0 0 12px;font-size:15px;}
  .wdays{display:flex;gap:5px;flex-wrap:wrap;}
  .wdays label{display:flex;flex-direction:column;align-items:center;font-size:11px;font-family:var(--mono);gap:2px;cursor:pointer;}
  .totem.dragging{opacity:0.5;}
  .projbar{display:flex;align-items:center;justify-content:space-between;gap:10px;margin:0 0 14px;flex-wrap:wrap;}
  .groupbar{display:flex;justify-content:flex-end;margin-bottom:8px;}
  .groupbar button,.addproj-btn{font-size:12px;padding:6px 11px;border:1px dashed var(--hair);border-radius:7px;background:var(--card);cursor:pointer;color:var(--graphite);}
  .groupbar button:hover,.addproj-btn:hover{color:var(--live);border-color:var(--live);}
  .grpsec{margin-bottom:14px;}
  .grphead{display:flex;align-items:center;gap:8px;padding:8px 6px;border-bottom:1px solid var(--hair);margin-bottom:8px;}
  .grphead.grp-over{background:color-mix(in srgb,var(--live) 15%,transparent);border-radius:6px;}
  .grp-x{font-size:11px;color:var(--graphite);cursor:pointer;}
  .grp-name{font-size:14px;font-weight:600;color:var(--ink);cursor:pointer;}
  .grp-count{font-size:11px;color:var(--graphite);}
  .grp-open{margin-left:auto;font-size:11px;padding:4px 9px;border:1px solid var(--hair);border-radius:6px;background:var(--card);cursor:pointer;color:var(--graphite);}
  .grp-open:hover{color:var(--live);border-color:var(--live);}
  .group-crumb{display:flex;align-items:center;gap:8px;margin-bottom:14px;font-size:14px;}
  .group-crumb b{font-weight:600;}
  .group-crumb button{font-size:12px;padding:4px 9px;border:1px solid var(--hair);border-radius:6px;background:var(--card);cursor:pointer;color:var(--graphite);}
  .grp-pick{font-size:10px;border:1px solid var(--hair);border-radius:5px;background:var(--card);color:var(--graphite);max-width:84px;padding:2px;}
  .totem-head .grp-pick{position:absolute;top:8px;right:34px;}
  .prow-grp{font-size:10px;border:1px solid var(--hair);border-radius:5px;background:var(--card);color:var(--graphite);max-width:84px;}
  .done-hidden{font-size:10.5px;color:var(--graphite);font-style:italic;padding:2px 4px 4px;opacity:.75;}
  .pimp{width:11px;height:11px;border-radius:50%;display:inline-block;cursor:pointer;flex:0 0 auto;border:1.5px solid var(--graphite);vertical-align:middle;margin-right:6px;}
  .pimp-high{background:#c0392b;border-color:#c0392b;}
  .pimp-med{background:#e08a1e;border-color:#e08a1e;}
  .pimp-low{background:transparent;border-color:var(--graphite);}
  .ccard.overdue{border-color:#c0392b!important;box-shadow:0 0 0 1px #c0392b, 0 2px 8px rgba(192,57,43,0.18);}
  .task.overdue{background:rgba(192,57,43,0.08);border-radius:6px;}
  .task.overdue .label::before{content:"⚠ ";color:#c0392b;}
  .cal-eventblock.past,.wtask.wevt.past,.mc-item.mc-evt.past{opacity:0.45;filter:grayscale(0.6);}
  .totem.imp-high{border:2px solid #c0392b;}
  .totem.imp-med{border:2px solid #e08a1e;}
  .totem.imp-low{border:1px solid var(--hair);}
  .prow.imp-high{box-shadow:inset 0 0 0 1.5px #c0392b;}
  .prow.imp-med{box-shadow:inset 0 0 0 1.5px #e08a1e;}
  .prow.imp-low{box-shadow:none;}
  .projsearch{display:flex;align-items:center;gap:6px;border:1px solid var(--hair);border-radius:9px;padding:7px 11px;background:var(--card);flex:1;max-width:280px;}
  .projsearch .ps-ic{color:var(--graphite);font-size:14px;}
  .projsearch input{border:none;background:none;outline:none;font-size:13px;width:100%;color:var(--ink);}
  .projtoggle{display:flex;gap:4px;}
  .projtoggle button{font-size:12px;padding:6px 11px;border:1px solid var(--hair);border-radius:7px;background:var(--card);cursor:pointer;color:var(--graphite);}
  .projtoggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .projlist{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;}
  .prow{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--hair);
    border-left:4px solid var(--graphite);border-radius:0 9px 9px 0;padding:11px 13px;cursor:grab;}
  .prow.dragging{opacity:.5;}
  .prow.reorder-over{outline:2px dashed var(--live);outline-offset:1px;}
  .prow-grip{color:var(--graphite);font-size:13px;cursor:grab;}
  .prow-name{font-size:14px;font-weight:600;flex:1;cursor:pointer;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .prow-chip{font-size:10px;padding:2px 7px;border-radius:5px;font-weight:600;white-space:nowrap;}
  .prow-up{font-size:10px;color:var(--graphite);white-space:nowrap;}
  .prow-prog{width:84px;height:5px;background:var(--hair);border-radius:3px;overflow:hidden;flex:0 0 auto;}
  .prow-prog i{display:block;height:100%;}
  .prow-pct{font-size:12px;color:var(--graphite);min-width:34px;text-align:right;}
  .prow-open{border:none;background:none;color:var(--graphite);font-size:14px;cursor:pointer;padding:0 2px;}
  .prow-open:hover{color:var(--live);}
  .prow.add{justify-content:center;color:var(--graphite);font-size:13px;cursor:pointer;border-left-color:var(--hair);border-style:dashed;}
  .prow.add:hover{color:var(--live);}
  .totem.reorder-over{outline:2px dashed var(--live,#5a8c8c);outline-offset:2px;}
  .totem[draggable="true"]{cursor:grab;}
  .totem[draggable="true"]:active{cursor:grabbing;}
  .impseg{display:flex;gap:6px;}
  .impseg button{flex:1;font-family:var(--mono);font-size:11px;border:1px solid var(--hair);background:var(--card);
    border-radius:8px;padding:8px;cursor:pointer;color:var(--graphite);}
  .impseg button.on[data-i="low"]{background:var(--graphite);color:#fff;border-color:var(--graphite);}
  .impseg button.on[data-i="med"]{background:var(--live);color:#fff;border-color:var(--live);}
  .impseg button.on[data-i="high"]{background:var(--danger);color:#fff;border-color:var(--danger);}
  .impdot{position:absolute;top:9px;right:9px;width:9px;height:9px;border-radius:50%;}
  .impdot.low{background:transparent;border:1.5px solid var(--upcoming);}
  .ccard .impdot{top:9px;right:26px;}
  .task .urg-edge{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;}
  .day-add .time-in{max-width:120px;}
  .day-add button{margin-left:0;}
  .day-add{gap:8px;flex-wrap:wrap;}
  #evBtnSpacer{flex-basis:100%;height:0;}
  .hint{font-family:var(--mono);font-size:11px;color:var(--graphite);margin-top:14px;text-align:center;}
  .banner{max-width:760px;margin:0 auto 16px;background:var(--live-soft);border:1px solid var(--live);border-radius:10px;
    padding:10px 14px;font-size:13px;color:var(--ink);display:none;}

// urgency derived from a task's due date: overdue/today, soon(<=2d), later(<=7d), calm
function urgencyOf(t){
  if(!t.date||t.status==="done")return "calm";
  const today=fromISO(todayISO()), due=fromISO(t.date);
  const days=Math.round((due-today)/86400000);
  if(days<=0)return "over";
  if(days<=2)return "urgent";
  if(days<=7)return "soon";
  return "calm";
}

  const days=Math.round((due-today)/86400000);
  if(days<0)return "overdue "+(-days)+"d";
  if(days===0)return "today";
  if(days===1)return "tomorrow";
  return "in "+days+"d";
}

function urlB64ToUint8(base64){
  const pad="=".repeat((4-base64.length%4)%4);
  const b64=(base64+pad).replace(/-/g,"+").replace(/_/g,"/");
  const raw=atob(b64);const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i);return arr;}
async function enablePush(){
  try{
    if(!("serviceWorker"in navigator)){alert("Step fail: no service worker support.");return false;}
    if(!("PushManager"in window)){alert("Step fail: no PushManager. On iPhone you must install to home screen.");return false;}
    if(!("Notification"in window)){alert("Step fail: no Notification API.");return false;}
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){alert("Permission not granted (got: "+perm+").");return false;}
    // make sure a service worker is actually registered (ready can hang forever if not)
    const reg=await Promise.race([
      navigator.serviceWorker.ready,
      new Promise((_,rej)=>setTimeout(()=>rej(new Error("service worker not ready (timed out). The app's service worker may not be registered — try a hard refresh.")),6000))
    ]);
    if(!reg||!reg.pushManager){alert("Step fail: no pushManager on registration.");return false;}
    let sub=await reg.pushManager.getSubscription();
    if(!sub){
      sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)});
    }
    db.notif.enabled=true;persist();
    const j=sub.toJSON();
    try{
      const r=await fetch(REST+"/push_subscriptions",{method:"POST",
        headers:{...HEADERS,"Prefer":"resolution=merge-duplicates,return=minimal"},
        body:JSON.stringify([{endpoint:j.endpoint,p256dh:j.keys.p256dh,auth:j.keys.auth,user_id:USER_ID,
          on_do:db.notif.onDo,on_due:db.notif.onDue,lead_days:db.notif.lead,updated_at:now()}])});
      if(!r.ok){alert("Enabled on this device, but saving to server failed ("+r.status+"). Test should still work. Detail: "+(await r.text()).slice(0,120));}
      else{alert("Notifications enabled and saved to server. Try the test button.");}
    }catch(saveErr){
      alert("Enabled on this device, but couldn't reach the server: "+saveErr.message);
    }
    return true;
  }catch(e){alert("Couldn't enable push: "+(e&&e.message?e.message:e));return false;}
}

  const res=await fetch(SUPABASE_URL+"/storage/v1/object/"+encodeURIComponent(STORAGE_BUCKET)+"/"+encodeURIComponent(path),{
    method:"POST",
    headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,"Content-Type":file.type||"application/octet-stream"},
    body:file
  });

  return SUPABASE_URL+"/storage/v1/object/public/"+encodeURIComponent(STORAGE_BUCKET)+"/"+encodeURIComponent(path);

      order:p.order==null?null:p.order,group_id:p.group_id??null,importance:p.importance??"med",

    const tRows=Object.values(db.tasks).map(t=>({id:t.id,user_id:U,project_id:t.project_id??null,text:t.text??"",
      status:t.status??"upcoming",date:t.date??null,do_date:t.do_date??null,do_end:t.do_end??"",sessions:JSON.stringify(t.sessions||[]),category:t.category??"",location:t.location??"",
      notes:t.notes??"",due_time:t.due_time??"",importance:t.importance??"med",done_at:t.done_at??null,pinned:!!t.pinned,x:Math.round(t.x??40),y:Math.round(t.y??40),
      updated_at:t.updated_at??now(),deleted:!!t.deleted}));
    await upsert("projects",pRows);
    await upsert("tasks",tRows);
    const cRows=Object.values(db.categories).map(c=>({id:c.id,user_id:U,name:c.name??"",color:c.color??"#888",
      updated_at:c.updated_at??now(),deleted:!!c.deleted}));
    const aRows=Object.values(db.arrows).map(a=>({id:a.id,user_id:U,project_id:a.project_id??null,
      from_id:a.from,to_id:a.to,updated_at:a.updated_at??now(),deleted:!!a.deleted}));
    const eRows=Object.values(db.events).map(e=>({id:e.id,user_id:U,title:e.title??"",date:e.date??null,
      start:e.start??"09:00",end:e.end??"10:00",project_id:e.project_id??null,location:e.location??"",
      notes:e.notes??"",x:Math.round(e.x??40),y:Math.round(e.y??40),updated_at:e.updated_at??now(),deleted:!!e.deleted}));
    await upsert("categories",cRows);
    await upsert("arrows",aRows);
    await upsert("events",eRows);
    const bRows=Object.values(db.bundles).map(b=>({id:b.id,user_id:U,project_id:b.project_id??null,name:b.name??"",
      task_ids:JSON.stringify(b.task_ids||[]),collapsed:!!b.collapsed,x:Math.round(b.x??60),y:Math.round(b.y??60),
      w:Math.round(b.w??280),h:Math.round(b.h??200),updated_at:b.updated_at??now(),deleted:!!b.deleted}));
    await upsert("bundles",bRows);
    const nRows=Object.values(db.notes).map(n=>({id:n.id,user_id:U,project_id:n.project_id??null,kind:n.kind??"text",
      text:n.text??"",url:n.url??"",filename:n.filename??"",x:Math.round(n.x??80),y:Math.round(n.y??80),
      w:Math.round(n.w??220),h:Math.round(n.h??120),updated_at:n.updated_at??now(),deleted:!!n.deleted}));
    await upsert("notes",nRows);
    const gRows=Object.values(db.groups).map(g=>({id:g.id,user_id:U,name:g.name??"",
      order:g.order==null?null:g.order,created:g.created??now(),updated_at:g.updated_at??now(),deleted:!!g.deleted}));
    await upsert("groups",gRows);
    const since=db.lastPull||0;
    const[sp,st,sc,sa,se,sb,sn,sg]=await Promise.all([pull("projects",since),pull("tasks",since),
      pull("categories",since),pull("arrows",since),pull("events",since),pull("bundles",since),pull("notes",since),pull("groups",since)]);
    let changed=false,maxTs=since;
    const merge=(store,row)=>{maxTs=Math.max(maxTs,row.updated_at||0);const cur=store[row.id];
      if(!cur||(row.updated_at||0)>(cur.updated_at||0)){store[row.id]=row;changed=true;}};
    sp.forEach(r=>merge(db.projects,r));
    st.forEach(r=>{if(typeof r.sessions==="string"){try{r.sessions=JSON.parse(r.sessions||"[]")}catch(e){r.sessions=[]}}
      if(Array.isArray(r.sessions))r.sessions=r.sessions.filter(se=>se&&typeof se.date==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(se.date));
      merge(db.tasks,r);});
    sc.forEach(r=>merge(db.categories,r));
    sa.forEach(r=>{const norm={id:r.id,project_id:r.project_id,from:r.from_id,to:r.to_id,
      updated_at:r.updated_at,deleted:r.deleted};merge(db.arrows,norm);});
    se.forEach(r=>merge(db.events,r));
    sb.forEach(r=>{const norm={id:r.id,project_id:r.project_id,name:r.name,
      task_ids:(()=>{try{return JSON.parse(r.task_ids||"[]")}catch(e){return[]}})(),
      collapsed:r.collapsed,x:r.x,y:r.y,w:r.w,h:r.h,updated_at:r.updated_at,deleted:r.deleted};merge(db.bundles,norm);});
    sn.forEach(r=>merge(db.notes,r));
    sg.forEach(r=>merge(db.groups,r));
    db.lastPull=maxTs;persist();
    if(changed&&!dragging)render();
    setSync("online","synced");
    if(!syncedOnce){syncedOnce=true;maybeSeedExample();}
  }catch(e){console.error(e);setSync("error","sync error · saved locally");}
}

const app=document.getElementById("app");
let dragging=false;
function render(){
  document.querySelectorAll(".views button").forEach(b=>b.classList.toggle("active",b.dataset.view===db.view&&!db.openProject));
  if(db.openProject&&projById(db.openProject)&&!projById(db.openProject).deleted){renderDetail();}
  else if(db.view==="projects")renderProjects();
  else if(db.view==="day")renderDay();
  else if(db.view==="month")renderMonth();
  else renderWeek();
  persist();

/* overview */
function isPastEvent(ev){
  if(!ev||!ev.date)return false;
  const today=todayISO();
  if(ev.date<today)return true;
  if(ev.date===today&&ev.end){const nowM=new Date().getHours()*60+new Date().getMinutes();
    if(hm(ev.end)<nowM)return true;}
  return false;
}
function isOverdue(t){  if(t.deleted||t.status==="done"||t.status==="pending")return false;
  if(!t.date)return false;
  return t.date<todayISO();
}
function metaTag(t){const bits=[];if(t.date)bits.push(t.date===todayISO()?"today":fromISO(t.date).toLocaleDateString(undefined,{day:'numeric',month:'short'}));
  if(t.due_time)bits.push(t.due_time);
  if(t.category&&catById(t.category)&&!catById(t.category).deleted)bits.push(catById(t.category).name);
  return bits.join(" · ");}
const unassignedTasks=()=>Object.values(db.tasks).filter(t=>!t.deleted&&!t.project_id);

      add.addEventListener("click",()=>{const id=newProject();openProject(id);});board.appendChild(add);
      outer.appendChild(board);

function buildProjectCard(p){
  const tasks=tasksOf(p.id);const done=tasks.filter(t=>t.status==="done");
  const live=tasks.filter(t=>t.status==="live").sort((a,b)=>{
    const ad=soonestDate(a),bd=soonestDate(b);
    if(ad&&bd)return ad.localeCompare(bd);
    if(ad&&!bd)return -1;
    if(!ad&&bd)return 1;
    return 0;});
  const up=tasks.filter(t=>t.status==="upcoming").sort((a,b)=>{
    const ad=soonestDate(a),bd=soonestDate(b);
    if(ad&&bd)return ad.localeCompare(bd);
    if(ad&&!bd)return -1;
    if(!ad&&bd)return 1;
    return 0;});
  const pend=tasks.filter(t=>t.status==="pending");
  const counted=tasks.filter(t=>t.status!=="pending");
  const pct=counted.length?Math.round(done.length/counted.length*100):0;
  // dashboard only shows recent done: within 3 days AND at most the 4 most recent
  const DONE_DAYS=3, DONE_MAX=4, cutoff=Date.now()-DONE_DAYS*86400000;
  const doneShown=done.slice()
    .sort((a,b)=>(b.done_at||0)-(a.done_at||0))
    .filter(t=>(t.done_at||0)>=cutoff)
    .slice(0,DONE_MAX);
  const doneHidden=done.length-doneShown.length;
  const el=document.createElement("div");el.className="totem imp-"+(p.importance||"med");el.dataset.pid=p.id;el.draggable=true;
  el.addEventListener("dragstart",e=>{
    if(e.target.closest("button,input,select,textarea,.card,.stack")){e.preventDefault();return;}
    e.dataTransfer.setData("text/proj",p.id);e.dataTransfer.effectAllowed="move";el.classList.add("dragging");});
  el.addEventListener("dragend",()=>el.classList.remove("dragging"));
  el.innerHTML=`<div class="totem-head"><span class="swatch" style="background:${p.color}"></span>
    <button class="open-proj" title="Open canvas">⤢</button>
    <select class="grp-pick" title="Move to group"></select>
    <button class="delproj" title="Delete">&times;</button>
    <h3 title="Open canvas"><span class="pimp pimp-${p.importance||"med"}" title="Importance — click to change"></span><span class="pname"></span></h3>
    <div class="progress"><i style="width:${pct}%;background:${p.color}"></i></div>
    <div class="totem-meta"><span>${done.length}/${counted.length} done</span><span>${pct}%</span>${pend.length?`<span>${pend.length} pending</span>`:""}</div></div>
    <div class="stack"></div>`;
  el.querySelector(".pname").textContent=p.name;
  el.querySelector(".pname").addEventListener("click",()=>openProject(p.id));
  el.querySelector(".open-proj").addEventListener("click",()=>openProject(p.id));
  el.querySelector(".pimp").addEventListener("click",e=>{e.stopPropagation();
    const order=["low","med","high"];p.importance=order[(order.indexOf(p.importance||"med")+1)%3];p.updated_at=now();persist();render();pushSoon();});
  el.querySelector(".delproj").addEventListener("click",()=>{if(confirm(`Delete "${p.name}" and its tasks?`))delProject(p);});
  const gp=el.querySelector(".grp-pick");
  gp.innerHTML=`<option value="">no group</option>`+liveGroups().map(g=>`<option value="${g.id}" ${p.group_id===g.id?"selected":""}>${esc(g.name)}</option>`).join("");
  gp.addEventListener("change",()=>assignProjectGroup(p.id,gp.value||null));
  gp.addEventListener("click",e=>e.stopPropagation());
  el.addEventListener("dragover",e=>{e.preventDefault();
    const isProj=e.dataTransfer.types.includes("text/proj");el.classList.add(isProj?"reorder-over":"droptarget");});
  el.addEventListener("dragleave",()=>{el.classList.remove("droptarget");el.classList.remove("reorder-over");});
  el.addEventListener("drop",e=>{e.preventDefault();el.classList.remove("droptarget");el.classList.remove("reorder-over");
    const pid=e.dataTransfer.getData("text/proj");
    if(pid&&db.projects[pid]&&pid!==p.id){reorderProject(pid,p.id);return;}
    const tid=e.dataTransfer.getData("text/task");if(tid&&db.tasks[tid]){db.tasks[tid].project_id=p.id;db.tasks[tid].status="pending";touchTask(db.tasks[tid]);}});
  const stack=el.querySelector(".stack");
  zone(stack,"Done",doneShown,"done",true);
  if(doneHidden>0){const note=document.createElement("div");note.className="done-hidden";
    note.textContent=`+${doneHidden} older done hidden`;stack.appendChild(note);}
  zone(stack,"Now",live,"live",doneShown.length===0);zone(stack,"Upcoming",up,"upcoming",false);
  const qa=document.createElement("input");qa.className="quickadd";qa.placeholder="+ quick add task";
  qa.addEventListener("keydown",e=>{if(e.key==="Enter"&&qa.value.trim()){
    const id=newTask(p.id,"upcoming",null);db.tasks[id].text=qa.value.trim();touchTask(db.tasks[id]);qa.value="";}});
  stack.appendChild(qa);
  return el;
}
function buildUnassigned(){

    const ue=document.createElement("div");ue.className="unassigned-area";
    ue.innerHTML=`<div class="ua-head">UNASSIGNED · ${loose.length} to sort <span class="ua-hint">drag onto a project above, or use the dropdown</span></div>`;
    const ul=document.createElement("div");ul.className="ua-list";

      row.innerHTML=`<span class="ua-text"></span><select class="assign"></select><button class="ua-del" title="delete">&times;</button>`;
      row.querySelector(".ua-text").textContent=t.text;

      const sel=row.querySelector(".assign");

  return wrap;
}

    e.dataTransfer.setData("text/proj",p.id);e.dataTransfer.effectAllowed="move";row.classList.add("dragging");});
  row.addEventListener("dragend",()=>row.classList.remove("dragging"));

    const pid=e.dataTransfer.getData("text/proj");
    if(pid&&db.projects[pid]&&pid!==p.id)reorderProject(pid,p.id);});

function zone(stack,label,tasks,status,first){
  const lab=document.createElement("div");lab.className="zone-label zl-"+status+(first?" first":"");lab.textContent=label;stack.appendChild(lab);
  if(!tasks.length){const ph=document.createElement("div");ph.className="task "+status;ph.style.opacity=".5";
    ph.style.fontStyle="italic";ph.style.cursor="default";ph.innerHTML=`<span class="label" style="font-size:12.5px">—</span>`;stack.appendChild(ph);return;}
  tasks.forEach(t=>{const row=document.createElement("div");row.className="task "+status+(isOverdue(t)?" overdue":"");row.style.position="relative";
    const m=metaTag(t);
    const u=urgencyOf(t);const edge=URG_COLOR[u]&&u!=="calm"?`<span class="urg-edge" style="background:${URG_COLOR[u]}"></span>`:"";
    const imp=t.importance||"med";
    const dot=imp==="low"?`<span class="impdot low" style="position:static;margin-left:auto"></span>`
      :`<span class="impdot" style="position:static;margin-left:auto;background:${IMP_COLOR[imp]}"></span>`;
    row.innerHTML=`${edge}<span class="tick"></span><span class="label"></span>${m?`<span class="meta-dot">${esc(m)}</span>`:""}${dot}`;
    row.querySelector(".label").textContent=t.text;
    row.querySelector(".tick").addEventListener("click",e=>{e.stopPropagation();cycle(t);});
    row.addEventListener("click",()=>openTask(t.id));
    stack.appendChild(row);});
}
function setStatus(t,s){
  const wasDone=t.status==="done";
  t.status=s;
  if(s==="done"&&!wasDone)t.done_at=now();
  if(s!=="done")t.done_at=null;
}
// mark a task as manually pinned (user chose its status) so auto-status leaves it alone
function pinStatus(t,s){t.pinned=true;setStatus(t,s);}
// soonest relevant date for a task: earliest of due date and any session/do_date, today or future
function validDate(d){return typeof d==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(d);}
function soonestDate(t){
  const cands=[];if(validDate(t.date))cands.push(t.date);if(validDate(t.do_date))cands.push(t.do_date);
  (t.sessions||[]).forEach(s=>{if(validDate(s.date))cands.push(s.date);});
  if(!cands.length)return null;
  return cands.sort()[0];
}
// auto-assign Now/Upcoming to dated, un-pinned, not-done tasks. Returns true if anything changed.
function runAutoStatus(){
  const today=todayISO();
  let changed=false;
  Object.values(db.tasks).forEach(t=>{
    if(t.deleted||t.status==="done"||t.status==="pending"||t.pinned)return;
    const d=soonestDate(t);if(!d)return; // undated tasks keep whatever they are
    // due today or overdue => Now; future => Upcoming
    const want=(d<=today)?"live":"upcoming";
    if(t.status!==want){t.status=want;t.updated_at=now();changed=true;}
  });
  return changed;
}
// move a task's canvas position into the vertical band matching its status
function snapToBand(t){
  const bands=bandTops(WORLD_H);const b=bands[t.status];if(!b)return;
  // keep x; put y near the top-third of the band so it reads as "in" that band
  const targetTop=b.top+Math.min(b.h*0.25,80);
  // only move if it's currently outside its band (don't yank cards already placed)
  const cy=(t.y||0)+90; // approx card mid
  if(cy<b.top||cy>=b.top+b.h){t.y=Math.round(targetTop);}
}
function setStatusSnap(t,s){t.pinned=true;setStatus(t,s);snapToBand(t);}
function cycle(t){const next=t.status==="upcoming"?"live":t.status==="live"?"done":"upcoming";
  t.pinned=true;setStatus(t,next);
  touchTask(t);}

const WORLD_W=3200, WORLD_H=2400;
function vpOf(pid){if(!db.viewports[pid])db.viewports[pid]={z:1,px:0,py:0};return db.viewports[pid];}
function minZoomFor(pid){const cv=document.getElementById("canvas");if(!cv)return 0.45;
  // world must always cover the viewport in both axes so bands never stop short
  const need=Math.max(cv.clientWidth/WORLD_W,cv.clientHeight/WORLD_H);
  return Math.max(0.45,need);}
function clampPan(pid){const cv=document.getElementById("canvas");if(!cv)return;const v=vpOf(pid);
  const sw=WORLD_W*v.z,sh=WORLD_H*v.z;
  // keep world covering the viewport: px in [cw-sw, 0], py in [ch-sh, 0]
  const minX=Math.min(0,cv.clientWidth-sw),minY=Math.min(0,cv.clientHeight-sh);
  v.px=Math.max(minX,Math.min(0,v.px));v.py=Math.max(minY,Math.min(0,v.py));}
function applyViewport(pid){const world=document.getElementById("world");if(!world)return;const v=vpOf(pid);
  const mz=minZoomFor(pid);if(v.z<mz)v.z=mz;
  clampPan(pid);
  world.style.transform=`translate(${v.px}px,${v.py}px) scale(${v.z})`;
  const cv=document.getElementById("canvas");if(cv)cv.classList.toggle("zoomed-out",v.z<0.7);}
function setZoom(pid,z){const v=vpOf(pid);v.z=Math.max(minZoomFor(pid),Math.min(1.6,z));persist();
  const inp=document.querySelector(".zoomctl input");if(inp)inp.value=Math.round(v.z*100);
  applyViewport(pid);drawArrows(pid);}
function fitView(pid){const v=vpOf(pid);v.z=Math.max(minZoomFor(pid),1);v.px=0;v.py=0;persist();applyViewport(pid);drawArrows(pid);
  const inp=document.querySelector(".zoomctl input");if(inp)inp.value=Math.round(v.z*100);}
function enableCanvasPanZoom(pid){
  const canvas=document.getElementById("canvas");if(!canvas||canvas._wired)return;canvas._wired=true;
  canvas.addEventListener("wheel",e=>{e.preventDefault();const v=vpOf(pid);
    if(e.ctrlKey||e.metaKey){setZoom(pid,v.z-e.deltaY*0.002);}
    else{v.px-=e.deltaX;v.py-=e.deltaY;clampPan(pid);persist();applyViewport(pid);}},{passive:false});
  canvas.addEventListener("mousedown",e=>{
    if(e.target!==canvas&&e.target.id!=="world"&&!e.target.classList.contains("band"))return;
    if(arrowFrom)return;const v=vpOf(pid);const sx=e.clientX,sy=e.clientY,opx=v.px,opy=v.py;
    const mv=ev=>{v.px=opx+(ev.clientX-sx);v.py=opy+(ev.clientY-sy);clampPan(pid);applyViewport(pid);};
    const up=()=>{persist();drawArrows(pid);document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);});
  let pinchD=0;
  canvas.addEventListener("touchmove",e=>{if(e.touches.length===2){e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchD)setZoom(pid,vpOf(pid).z*(d/pinchD));pinchD=d;}},{passive:false});
  canvas.addEventListener("touchend",()=>{pinchD=0;});
}

// In arrow mode, clicking any canvas item picks source then target. Returns true if handled.
function handleArrowClick(pid,id,e){
  if(!arrowFrom)return false;
  e.preventDefault();e.stopPropagation();
  if(arrowFrom==="_arm"){arrowFrom=id;render();}
  else if(arrowFrom===id){arrowFrom=null;render();}

function drawArrows(pid){const svg=document.getElementById("arrowlayer");if(!svg)return;
  svg.querySelectorAll("path.arrow").forEach(n=>n.remove());
  arrowsOf(pid).forEach(a=>{
    const ce=arrowNodeFor(a.from),te=arrowNodeFor(a.to);
    if(!ce||!te)return;
    const c1={x:ce.offsetLeft+ce.offsetWidth/2,y:ce.offsetTop+ce.offsetHeight/2};
    const c2={x:te.offsetLeft+te.offsetWidth/2,y:te.offsetTop+te.offsetHeight/2};
    const start=edgePoint(c1,c2,ce.offsetWidth/2,ce.offsetHeight/2);
    const end=edgePoint(c2,c1,te.offsetWidth/2+3,te.offsetHeight/2+3);
    const adx=Math.abs(c2.x-c1.x),ady=Math.abs(c2.y-c1.y);
    let d;
    if(ady>=adx){ // mostly vertical: curve arrives vertically so the head points up/down
      const my=(start.y+end.y)/2;
      d=`M ${start.x} ${start.y} C ${start.x} ${my}, ${end.x} ${my}, ${end.x} ${end.y}`;
    } else { // mostly horizontal
      const mx=(start.x+end.x)/2;
      d=`M ${start.x} ${start.y} C ${mx} ${start.y}, ${mx} ${end.y}, ${end.x} ${end.y}`;
    }
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",d);
    path.setAttribute("class","arrow");path.setAttribute("fill","none");
    path.setAttribute("stroke","#7a746a");path.setAttribute("stroke-width","2");
    path.setAttribute("marker-end","url(#ah)");path.style.pointerEvents="stroke";path.style.cursor="pointer";
    path.addEventListener("click",()=>{if(confirm("Delete this arrow?")){delArrow(a);render();}});
    svg.appendChild(path);
  });}
function edgePoint(c,t,hw,hh){
  const dx=t.x-c.x,dy=t.y-c.y;
  if(dx===0&&dy===0)return{x:c.x,y:c.y};
  const sx=dx!==0?hw/Math.abs(dx):Infinity;
  const sy=dy!==0?hh/Math.abs(dy):Infinity;
  const s=Math.min(sx,sy);
  return{x:c.x+dx*s,y:c.y+dy*s};
}

function cardEl(t,p){

      ?`<span class="chip" style="background:${ch.c}22;color:${ch.c}">${esc(ch.t)}</span>`
      :`<span class="chip">${esc(ch.t)}</span>`).join("")}</div>`;
  c.querySelector(".ct").textContent=t.text;

function enableDrag(c,t,p){
  if(selected.has(t.id))c.classList.add("selected");
  const down=e=>{
    if(e.target.classList.contains("cstatus"))return;
    if(arrowFrom){e.preventDefault();
      if(arrowFrom==="_arm"){arrowFrom=t.id;render();}
      else if(arrowFrom===t.id){arrowFrom=null;render();}
      else{newArrow(p.id,arrowFrom,t.id);arrowFrom=null;render();}
      return;}
    // shift/ctrl-click toggles selection instead of dragging
    if(e.shiftKey||e.ctrlKey||e.metaKey){e.preventDefault();
      selected.has(t.id)?selected.delete(t.id):selected.add(t.id);
      c.classList.toggle("selected");updateSelBar();return;}
    e.preventDefault();e.stopPropagation();
    const pt=e.touches?e.touches[0]:e;const z=vpOf(p.id).z;
    let sx=pt.clientX,sy=pt.clientY,ox=t.x??40,oy=t.y??40,moved=false,mergeTarget=null,hoverStart=0;
    dragging=true;c.classList.add("dragging");
    const move=e=>{const pt=e.touches?e.touches[0]:e;const dx=(pt.clientX-sx)/z,dy=(pt.clientY-sy)/z;
      if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
      let nx=Math.max(0,ox+dx),ny=Math.max(0,oy+dy);
      c.style.left=nx+"px";c.style.top=ny+"px";t._nx=nx;t._ny=ny;
      if(moved)drawArrows(p.id);
      // detect hover over another card/bundle for drag-to-merge
      c.style.pointerEvents="none";
      const under=document.elementFromPoint(pt.clientX,pt.clientY);
      c.style.pointerEvents="";
      const card=under&&under.closest&&under.closest(".ccard");
      const bun=under&&under.closest&&under.closest(".bundle");
      const newTarget=(card&&card!==c&&card.id.startsWith("card_"))?card:(bun||null);
      if(newTarget!==mergeTarget){if(mergeTarget)mergeTarget.classList.remove("merge-hover");
        mergeTarget=newTarget;hoverStart=Date.now();if(mergeTarget)mergeTarget.classList.add("merge-hover");}
      if(e.cancelable)e.preventDefault();};
    const up=()=>{dragging=false;c.classList.remove("dragging");
      document.removeEventListener("mousemove",move);document.removeEventListener("mouseup",up);
      document.removeEventListener("touchmove",move);document.removeEventListener("touchend",up);
      if(mergeTarget)mergeTarget.classList.remove("merge-hover");
      if(moved){
        // drag-to-merge: dropped on a bundle, or on another card (held >500ms) → bundle them
        if(mergeTarget&&mergeTarget.id.startsWith("bundle_")&&Date.now()-hoverStart>400){
          const b=bundleById(mergeTarget.id.slice(7));if(b){addToBundle(b,t.id);render();return;}}
        if(mergeTarget&&mergeTarget.id.startsWith("card_")&&Date.now()-hoverStart>500){
          const otherId=mergeTarget.id.slice(5);
          if(db.tasks[otherId]){const name=prompt("Name this bundle","Bundle");if(name!==null){
            newBundle(p.id,name||"Bundle",[otherId,t.id],db.tasks[otherId].x,db.tasks[otherId].y);render();return;}}}
        const cardMid=(t._ny??oy)+c.offsetHeight/(2*z);
        const newStatus=statusForY(cardMid,WORLD_H);
        t.x=Math.round(t._nx);t.y=Math.round(t._ny);delete t._nx;delete t._ny;
        if(newStatus!==t.status){t.pinned=true;setStatus(t,newStatus);}
        touchTask(t);
      } else {openTask(t.id);}};
    document.addEventListener("mousemove",move);document.addEventListener("mouseup",up);
    document.addEventListener("touchmove",move,{passive:false});document.addEventListener("touchend",up);};
  c.addEventListener("mousedown",down);c.addEventListener("touchstart",down,{passive:false});
}
function tidy(pid){const bands=bandTops(WORLD_H);const cols=Math.max(1,Math.floor((WORLD_W-60)/235));
  const counters={done:0,live:0,upcoming:0};
  tasksOf(pid).filter(t=>t.status!=="pending"&&!collapsedMember(t)).forEach(t=>{const i=counters[t.status]++;const b=bands[t.status];
    t.x=40+(i%cols)*235;t.y=Math.round(b.top+44+Math.floor(i/cols)*120);t.updated_at=now();});
  persist();render();pushSoon();}

    <div class="field"><label>Event</label><textarea id="e_title" style="min-height:48px">${esc(e.title)}</textarea></div>
    <div class="field"><label>Date</label><input type="date" id="e_date" value="${e.date||""}"></div>
    <div class="field row2">
      <div><label>Start</label><input type="time" id="e_start" value="${e.start||"09:00"}"></div>
      <div><label>End</label><input type="time" id="e_end" value="${e.end||"10:00"}"></div></div>
    <div class="field"><label>Project (optional)</label><select id="e_proj"><option value="">— none —</option>${liveProjects().map(p=>`<option ${p.id===(e.project_id||"")?"selected":""} value="${p.id}">${esc(p.name)}</option>`).join("")}</select></div>
    <div class="field"><label>Location</label><input type="text" id="e_loc" placeholder="e.g. seminar room" value="${esc(e.location||"")}"></div>
    <div class="field"><label>Notes</label><textarea id="e_notes">${esc(e.notes||"")}</textarea></div>
    <div class="foot" style="padding:0;border:none;margin-top:6px">
      <button class="del" id="e_del">Delete event</button>
      <button id="e_done" style="background:var(--ink);color:var(--paper);border-color:var(--ink)">Done</button></div>`;
  const bind=(sel,prop,ev)=>{const el=drawerBody.querySelector(sel);el.addEventListener(ev||"input",()=>{e[prop]=el.value;e.updated_at=now();persist();pushSoon();});};
  bind("#e_title","title");bind("#e_date","date","change");bind("#e_start","start","change");
  bind("#e_end","end","change");bind("#e_proj","project_id","change");bind("#e_loc","location");bind("#e_notes","notes");
  drawerBody.querySelector("#e_del").addEventListener("click",()=>{closeDrawer();delEvent(e);});
  drawerBody.querySelector("#e_done").addEventListener("click",closeDrawer);
  document.querySelector(".drawer header b").textContent="Event";
  drawer.classList.add("open");drawerBack.style.display="block";
}
function tasksForDate(iso){const out=[];liveProjects().forEach(p=>tasksOf(p.id).forEach(t=>{
  if(t.deleted||t.status==="pending")return;
  const hasSession=(t.sessions||[]).some(s=>validDate(s.date)&&s.date===iso);
  if(hasSession||t.do_date===iso||t.date===iso)out.push({t,p});}));
  return out.sort((a,b)=>(a.t.due_time||"99").localeCompare(b.t.due_time||"99"));}
// returns entries {t,p,start,end} — one per session on that date (plus legacy do_date)
function doingForDate(iso){const out=[];liveProjects().forEach(p=>tasksOf(p.id).forEach(t=>{
  if(t.deleted||t.status==="pending")return;
  (t.sessions||[]).forEach(s=>{if(validDate(s.date)&&s.date===iso)out.push({t,p,start:s.start||"",end:s.end||""});});
  // legacy single do_date (only if no sessions cover it)
  if(validDate(t.do_date)&&t.do_date===iso&&!(t.sessions||[]).some(s=>s.date===iso))
    out.push({t,p,start:t.due_time||"",end:t.do_end||""});}));
  return out.sort((a,b)=>(a.start||"99").localeCompare(b.start||"99"));}
function dueForDate(iso){const out=[];liveProjects().forEach(p=>tasksOf(p.id).forEach(t=>{
  if(t.status!=="pending"&&t.date===iso)out.push({t,p});}));
  return out.sort((a,b)=>(a.t.due_time||"99").localeCompare(b.t.due_time||"99"));}
const HOUR_PX=60, DAY_START=7, DAY_END=22; // 7am–10pm grid
function modeToggle(){
  const wrap=document.createElement("div");wrap.className="modetoggle";
  ["calendar","list"].forEach(m=>{const b=document.createElement("button");b.textContent=m;
    b.className=(db.calMode||"calendar")===m?"on":"";
    b.addEventListener("click",()=>{db.calMode=m;persist();render();});wrap.appendChild(b);});
  return wrap;
}
function minutesOf(t){if(!t.due_time)return null;const[h,m]=t.due_time.split(":").map(Number);return h*60+(m||0);}
function minsToTime(mins){mins=Math.max(0,Math.min(24*60-1,Math.round(mins/15)*15));
  return String(Math.floor(mins/60)).padStart(2,"0")+":"+String(mins%60).padStart(2,"0");}
// category filter/sort applied to task rows [{t,p}]
function applyCatControls(rows){
  let out=rows;
  if(db.catFilter&&db.catFilter.length)out=out.filter(({t})=>db.catFilter.includes(t.category||""));
  if(db.catSort)out=out.slice().sort((a,b)=>{
    const an=(a.t.category&&catById(a.t.category))?catById(a.t.category).name:"~";
    const bn=(b.t.category&&catById(b.t.category))?catById(b.t.category).name:"~";
    return an.localeCompare(bn)||(a.t.due_time||"99").localeCompare(b.t.due_time||"99");});
  return out;
}
function catControlBar(){
  const bar=document.createElement("div");bar.className="catbar";
  const cats=liveCategories();
  if(!cats.length)return bar;
  const lab=document.createElement("span");lab.className="catbar-label";lab.textContent="categories:";
  bar.appendChild(lab);
  const chip=(id,name,color)=>{const b=document.createElement("button");b.className="catchip"+((db.catFilter||[]).includes(id)?" on":"");
    b.textContent=name;if(color){b.style.borderColor=color;if((db.catFilter||[]).includes(id)){b.style.background=color;b.style.color="#fff";}}
    b.addEventListener("click",()=>{const f=new Set(db.catFilter||[]);f.has(id)?f.delete(id):f.add(id);db.catFilter=[...f];persist();render();});
    return b;};
  cats.forEach(c=>bar.appendChild(chip(c.id,c.name,c.color)));

  sortBtn.textContent="group by category";
  sortBtn.addEventListener("click",()=>{db.catSort=!db.catSort;persist();render();});
  bar.appendChild(sortBtn);
  if((db.catFilter||[]).length){const clr=document.createElement("button");clr.className="catclear";clr.textContent="clear filter";
    clr.addEventListener("click",()=>{db.catFilter=[];persist();render();});bar.appendChild(clr);}
  return bar;
}
// drag a calendar block (task or event) to a new time; commits via setter(newStartMins,durationMins)
function enableTimeDrag(el,startMins,durMins,colHeightPerMin,onCommit){
  let sy,oy,moved;
  const down=e=>{if(e.target.closest(".ev-resize"))return;e.preventDefault();
    const pt=e.touches?e.touches[0]:e;sy=pt.clientY;oy=startMins;moved=false;dragging=true;el.classList.add("dragging");
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);
    document.addEventListener("touchmove",mv,{passive:false});document.addEventListener("touchend",up);};
  const mv=e=>{const pt=e.touches?e.touches[0]:e;const dy=pt.clientY-sy;if(Math.abs(dy)>3)moved=true;
    const newStart=oy+dy/colHeightPerMin;el.style.top=((newStart-DAY_START*60)*colHeightPerMin)+"px";
    el._ns=newStart;if(e.cancelable)e.preventDefault();};
  const up=()=>{dragging=false;el.classList.remove("dragging");
    document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);
    document.removeEventListener("touchmove",mv);document.removeEventListener("touchend",up);
    if(moved){onCommit(Math.round((el._ns??oy)));}else{el._click&&el._click();}};
  el.addEventListener("mousedown",down);el.addEventListener("touchstart",down,{passive:false});
}

function packOverlaps(blocks){
  // sort by start, then end
  const arr=blocks.slice().sort((a,b)=>a.sm-b.sm||a.em-b.em);
  // group into clusters of transitively-overlapping blocks
  let i=0;
  while(i<arr.length){
    let clusterEnd=arr[i].em;const cluster=[arr[i]];let j=i+1;
    while(j<arr.length&&arr[j].sm<clusterEnd){cluster.push(arr[j]);clusterEnd=Math.max(clusterEnd,arr[j].em);j++;}
    // assign columns within the cluster (greedy: reuse a column whose last block ended)
    const colEnds=[]; // end time per column
    cluster.forEach(blk=>{
      let placed=false;
      for(let c=0;c<colEnds.length;c++){if(blk.sm>=colEnds[c]){blk.col=c;colEnds[c]=blk.em;placed=true;break;}}
      if(!placed){blk.col=colEnds.length;colEnds.push(blk.em);}
    });
    const cols=colEnds.length;cluster.forEach(blk=>blk.cols=cols);
    i=j;
  }
  return arr;
}
function dayGrid(iso,rows,due){
  const timed=rows.filter(r=>r.start);
  const allday=rows.filter(r=>!r.start);
  const evs=eventsForDate(iso);
  const cal=document.createElement("div");cal.className="cal";
  const ad=document.createElement("div");ad.className="allday";
  ad.innerHTML=`<div class="ad-label">all-day</div><div class="ad-items"></div>`;
  const adi=ad.querySelector(".ad-items");
  if(!allday.length&&!(due&&due.length))adi.innerHTML=`<span class="ad-empty">—</span>`;
  allday.forEach(({t,p})=>{const c=document.createElement("div");c.className="ad-chip doing"+(t.status==="done"?" done":"");
    c.style.borderLeftColor=p.color;c.innerHTML=`<span class="mc-dot" style="background:${p.color}"></span>▶ ${esc(t.text)}`;c.title=p.name;
    c.addEventListener("click",()=>openTask(t.id));adi.appendChild(c);});
  (due||[]).forEach(({t,p})=>{const c=document.createElement("div");c.className="ad-chip duemark"+(t.status==="done"?" done":"");
    c.innerHTML=`<span class="mc-dot" style="background:${p.color}"></span>⚑ ${esc(t.text)}`;c.title=p.name+" — due";
    c.addEventListener("click",()=>openTask(t.id));adi.appendChild(c);});
  cal.appendChild(ad);
  const grid=document.createElement("div");grid.className="hourgrid";
  grid.style.height=((DAY_END-DAY_START)*HOUR_PX)+"px";
  for(let h=DAY_START;h<=DAY_END;h++){const row=document.createElement("div");row.className="hourline";
    row.style.top=((h-DAY_START)*HOUR_PX)+"px";
    row.innerHTML=`<span class="hourlbl">${String(h).padStart(2,"0")}:00</span>`;grid.appendChild(row);}
  if(iso===todayISO()){const d=new Date();const mins=d.getHours()*60+d.getMinutes();
    if(mins>=DAY_START*60&&mins<=DAY_END*60){const nl=document.createElement("div");nl.className="nowline";
      nl.style.top=((mins-DAY_START*60)/60*HOUR_PX)+"px";grid.appendChild(nl);}}
  // collect all timed blocks (events + task sessions), pack overlaps into side-by-side columns
  const blocks=[];
  evs.forEach(ev=>{const sm=hm(ev.start),em=Math.max(hm(ev.end),sm+15);
    blocks.push({kind:"event",sm,em,ev});});
  timed.forEach(({t,p,start,end})=>{const sm=hm(start);const em=end&&hm(end)>sm?hm(end):sm+30;
    blocks.push({kind:"task",sm,em,t,p,start,end,hasDur:!!(end&&hm(end)>sm)});});
  const packed=packOverlaps(blocks);
  packed.forEach(blk=>{
    const top=(blk.sm-DAY_START*60)/60*HOUR_PX;
    const gw=100/blk.cols, left=blk.col*gw;
    if(blk.kind==="event"){const ev=blk.ev;const h=Math.max(22,(blk.em-blk.sm)/60*HOUR_PX);
      const block=document.createElement("div");block.className="cal-eventblock"+(isPastEvent(ev)?" past":"");
      block.style.top=Math.max(0,top)+"px";block.style.height=h+"px";
      block.style.left="calc(70px + (100% - 80px) * "+(left/100)+")";
      block.style.width="calc((100% - 80px) * "+(gw/100)+" - 3px)";block.style.right="auto";
      const p=ev.project_id&&projById(ev.project_id);if(p)block.style.boxShadow=`inset 4px 0 0 ${p.color}`;
      block.innerHTML=`<b>${ev.start}–${ev.end}</b> ${esc(ev.title)}${ev.location?` · ${esc(ev.location)}`:""}`;
      block._click=()=>openEvent(ev.id);
      enableTimeDrag(block,blk.sm,blk.em-blk.sm,HOUR_PX/60,(newStart)=>{const dur=hm(ev.end)-hm(ev.start);
        ev.start=minsToTime(newStart);ev.end=minsToTime(newStart+dur);touchEvent(ev);});
      grid.appendChild(block);
    } else {
      const {t,p,start,end,hasDur}=blk;const h=hasDur?Math.max(22,(blk.em-blk.sm)/60*HOUR_PX):0;
      const ev=document.createElement("div");ev.className="event"+(t.status==="done"?" done":"")+(hasDur?" hasdur":"");
      ev.style.top=Math.max(0,top)+"px";ev.style.borderLeftColor=p.color;ev.style.background=p.color+"1a";
      ev.style.left="calc(70px + (100% - 80px) * "+(left/100)+")";
      ev.style.width="calc((100% - 80px) * "+(gw/100)+" - 3px)";ev.style.right="auto";
      if(hasDur)ev.style.height=h+"px";
      ev.innerHTML=hasDur?`<b>${start}–${end}</b> ${esc(t.text)}`:`<b>${start}</b> ${esc(t.text)}`;
      ev.title=p.name;ev._click=()=>openTask(t.id);
      enableTimeDrag(ev,blk.sm,hasDur?(blk.em-blk.sm):60,HOUR_PX/60,(newStart)=>{
        const ns=minsToTime(newStart);
        const sess=(t.sessions||[]).find(s=>s.date===iso&&s.start===start);
        if(sess){sess.start=ns;if(hasDur)sess.end=minsToTime(newStart+(hm(end)-hm(start)));}
        else{t.due_time=ns;if(hasDur)t.do_end=minsToTime(newStart+(hm(end)-hm(start)));}
        touchTask(t);});
      grid.appendChild(ev);
    }
  });
  cal.appendChild(grid);
  return cal;
}
function hm(s){const[h,m]=(s||"0:0").split(":").map(Number);return h*60+(m||0);}

  const input=add.querySelector(".task-in"),timeIn=add.querySelector(".time-in"),sel=add.querySelector("select");
  const go=()=>{const text=input.value.trim();if(!text)return;const p=projById(sel.value);if(!p)return;

}
