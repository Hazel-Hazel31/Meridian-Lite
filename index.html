<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#23201b">
<title>Chronicle</title>
<link rel="manifest" id="manifestLink">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f7f8fa;--paper-deep:#eef0f3;--ink:#1a1d21;--graphite:#6b7280;
    --hair:#e3e6ea;--done:#5dcaa5;--live:#e08a1e;--live-soft:#fcf3e2;
    --upcoming:#b9c0c7;--danger:#c0392b;--card:#ffffff;--shadow:rgba(20,23,28,0.07);
    --soon:#5b8fc9;
    --mono:"SFMono-Regular",ui-monospace,"DejaVu Sans Mono",Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  }
  [data-theme="dark"]{
    --paper:#15171a;--paper-deep:#1c1f23;--ink:#e8eaed;--graphite:#9aa0a6;
    --hair:#2c3035;--done:#1d9e75;--live:#e08a1e;--live-soft:#3a2f1a;
    --upcoming:#5f6671;--danger:#e24b4a;--card:#1e2125;--shadow:rgba(0,0,0,0.3);
    --soon:#5b8fc9;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:var(--paper);
    color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;line-height:1.45;}
  header.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:16px;padding:12px 22px;
    background:var(--card);backdrop-filter:blur(6px);border-bottom:1px solid var(--hair);}
  .brand{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-0.5px;cursor:pointer;}
  .brand .dot{color:var(--live);}
  .brand small{display:block;font-size:10px;font-weight:500;letter-spacing:2px;text-transform:uppercase;
    color:var(--graphite);margin-top:2px;}
  .views{display:flex;gap:4px;}
  .views button{font-family:var(--mono);font-size:12px;letter-spacing:.5px;border:1px solid transparent;
    background:none;color:var(--graphite);padding:6px 13px;border-radius:999px;cursor:pointer;text-transform:uppercase;}
  .views button:hover{color:var(--ink);}
  .views button.active{background:var(--ink);color:var(--paper);}
  .spacer{flex:1;}
  .sync{font-family:var(--mono);font-size:11px;display:flex;align-items:center;gap:6px;color:var(--graphite);
    border:1px solid var(--hair);border-radius:999px;padding:5px 11px;background:var(--card);}
  .sync .led{width:8px;height:8px;border-radius:50%;background:var(--graphite);}
  .sync.online .led{background:var(--done);}
  .sync.offline .led{background:var(--upcoming);}
  .sync.syncing .led{background:var(--live);animation:pulse 1s infinite;}
  .sync.error .led{background:var(--danger);}
  @keyframes pulse{50%{opacity:.3;}}
  .iconbtn{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    color:var(--graphite);padding:6px 12px;border-radius:7px;cursor:pointer;}
  .iconbtn:hover{border-color:var(--graphite);color:var(--ink);}
  #installBtn{display:none;border-color:var(--live);color:var(--live);}
  main{padding:22px;}

  /* ---- projects overview ---- */
  .board{display:flex;gap:20px;align-items:flex-start;overflow-x:auto;padding-bottom:18px;}
  .totem{flex:0 0 290px;background:var(--card);border:1px solid var(--hair);border-radius:14px;
    box-shadow:0 1px 0 var(--shadow),0 10px 24px -18px var(--shadow);display:flex;flex-direction:column;min-height:220px;}
  .totem.add{background:transparent;border-style:dashed;align-items:center;justify-content:center;
    color:var(--graphite);cursor:pointer;min-height:220px;font-family:var(--mono);font-size:13px;}
  .totem.add:hover{border-color:var(--live);color:var(--live);}
  .totem-head{padding:14px 16px 12px;border-bottom:1px solid var(--hair);position:relative;}
  .totem-head .swatch{position:absolute;left:0;top:14px;bottom:14px;width:4px;border-radius:0 3px 3px 0;}
  .totem-head h3{margin:0 0 6px 8px;font-size:16px;letter-spacing:-0.2px;padding-right:46px;word-break:break-word;cursor:pointer;}
  .progress{margin-left:8px;height:5px;border-radius:3px;background:var(--paper-deep);overflow:hidden;}
  .progress>i{display:block;height:100%;background:var(--done);transition:width .3s ease;}
  .totem-meta{margin:6px 0 0 8px;font-family:var(--mono);font-size:11px;color:var(--graphite);display:flex;gap:10px;}
  .open-proj{position:absolute;right:34px;top:12px;border:none;background:none;cursor:pointer;color:var(--graphite);
    font-size:14px;padding:2px;}
  .open-proj:hover{color:var(--live);}
  .delproj{position:absolute;right:12px;top:12px;border:none;background:none;cursor:pointer;color:var(--hair);
    font-size:16px;line-height:1;padding:2px;}
  .delproj:hover{color:var(--danger);}
  .stack{padding:10px 14px 16px;display:flex;flex-direction:column;gap:4px;}
  .zone-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--graphite);
    margin:10px 0 4px;display:flex;align-items:center;gap:8px;}
  .zone-label::after{content:"";flex:1;height:1px;background:var(--hair);}
  .zone-label.first{margin-top:2px;}
  .task{display:flex;align-items:flex-start;gap:9px;padding:7px 9px;border-radius:9px;font-size:13.5px;
    border:1px solid transparent;position:relative;cursor:pointer;}
  .task:hover{background:var(--paper);}
  .task .tick{flex:0 0 16px;height:16px;margin-top:1px;border-radius:5px;border:1.5px solid var(--graphite);
    cursor:pointer;position:relative;}
  .task .label{flex:1;}
  .task .meta-dot{font-family:var(--mono);font-size:10px;color:var(--graphite);white-space:nowrap;margin-top:2px;}
  .task.done{color:var(--graphite);}
  .task.done .tick{background:var(--done);border-color:var(--done);}
  .task.done .tick::after{content:"";position:absolute;left:4px;top:1px;width:4px;height:8px;
    border:solid var(--card);border-width:0 2px 2px 0;transform:rotate(45deg);}
  .task.done .label{text-decoration:line-through;text-decoration-color:var(--done);}
  .task.live{background:var(--live-soft);}
  .task.live .tick{border-color:var(--live);}
  .task.live .label{font-weight:600;}
  .task.upcoming .tick{border-color:var(--upcoming);border-style:dashed;}
  .addtask{margin-top:6px;font-family:var(--mono);font-size:12px;color:var(--graphite);border:1px dashed var(--hair);
    background:none;border-radius:8px;padding:6px;cursor:pointer;width:100%;text-align:left;}
  .addtask:hover{border-color:var(--live);color:var(--live);}

  /* ---- project detail / canvas ---- */
  .detail-head{display:flex;align-items:center;gap:14px;margin-bottom:6px;}
  .detail-head .back{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    border-radius:8px;padding:6px 12px;cursor:pointer;color:var(--graphite);}
  .detail-head .back:hover{border-color:var(--ink);color:var(--ink);}
  .detail-head h2{font-size:22px;margin:0;letter-spacing:-0.3px;}
  .detail-head h2[contenteditable]:focus{outline:none;border-bottom:1px dashed var(--live);}
  .detail-sub{font-family:var(--mono);font-size:11px;color:var(--graphite);margin:0 0 14px 0;display:flex;gap:14px;align-items:center;}
  .canvas-tools{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
  .canvas-tools button{font-family:var(--mono);font-size:12px;border:1px solid var(--hair);background:var(--card);
    border-radius:8px;padding:7px 13px;cursor:pointer;color:var(--graphite);}
  .canvas-tools button:hover{border-color:var(--live);color:var(--live);}
  .canvas{position:relative;width:100%;height:calc(100vh - 230px);min-height:460px;border:1px solid var(--hair);
    border-radius:14px;background:
      radial-gradient(circle, rgba(35,32,27,0.06) 1px, transparent 1px) 0 0/22px 22px,
      var(--card);
    overflow:hidden;touch-action:none;}
  .world{position:absolute;left:0;top:0;transform-origin:0 0;will-change:transform;}
  .band{pointer-events:none;}
  .band-label{position:absolute;left:12px;top:8px;font-family:var(--mono);font-size:11px;letter-spacing:1.5px;}
  .arrowlayer{position:absolute;left:0;top:0;pointer-events:none;z-index:2;overflow:visible;}
  .ccard{position:absolute;width:210px;background:var(--paper);border:1px solid var(--hair);border-radius:12px;
    box-shadow:0 6px 16px -10px var(--shadow);padding:10px 12px;cursor:grab;user-select:none;border-left:4px solid var(--upcoming);z-index:3;}
  .ccard.dragging{cursor:grabbing;box-shadow:0 14px 30px -12px rgba(35,32,27,0.4);z-index:6;}
  .ccard.live{border-left-color:var(--live);background:var(--live-soft);}
  .ccard.done{border-left-color:var(--done);opacity:.82;}
  .ccard.arrowtarget{outline:2px dashed var(--live);outline-offset:2px;cursor:crosshair;}
  .ccard.arrowsource{outline:2px solid var(--live);outline-offset:2px;}
  .ccard.selected{outline:2px solid var(--live);outline-offset:2px;}
  .ccard.merge-hover,.bundle.merge-hover{outline:2px dashed var(--live);outline-offset:3px;}
  .ccard .ct{font-size:13.5px;font-weight:600;line-height:1.3;margin-bottom:6px;word-break:break-word;}
  .ccard.done .ct{text-decoration:line-through;color:var(--graphite);}
  .ccard .cmeta{font-family:var(--mono);font-size:10px;color:var(--graphite);display:flex;flex-wrap:wrap;gap:6px;}
  .ccard .cmeta .chip{background:var(--paper-deep);border-radius:5px;padding:1px 5px;}
  .ccard .cstatus{position:absolute;top:8px;right:8px;width:14px;height:14px;border-radius:4px;border:1.5px solid var(--graphite);cursor:pointer;}
  .ccard.done .cstatus{background:var(--done);border-color:var(--done);}
  .ccard.live .cstatus{border-color:var(--live);}
  .canvas.zoomed-out .ccard .cmeta,.canvas.zoomed-out .ccard .cstatus,.canvas.zoomed-out .ccard .impdot{display:none;}
  .canvas.zoomed-out .ccard{width:160px;padding:7px 9px;}
  .canvas.zoomed-out .ccard .ct{font-size:12px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .zoomctl{position:absolute;right:12px;bottom:12px;z-index:20;display:flex;align-items:center;gap:6px;
    background:var(--card);border:1px solid var(--hair);border-radius:10px;padding:5px 8px;box-shadow:0 4px 14px -8px var(--shadow);}
  .zoomctl button{font-family:var(--mono);font-size:13px;border:1px solid var(--hair);background:var(--paper);
    border-radius:6px;width:26px;height:26px;cursor:pointer;color:var(--graphite);}
  .zoomctl input[type=range]{width:90px;}
  .selbar{position:absolute;left:12px;bottom:12px;z-index:20;display:flex;align-items:center;gap:8px;
    background:var(--ink);color:var(--paper);border-radius:10px;padding:7px 12px;font-family:var(--mono);font-size:12px;}
  .selbar button{font-family:var(--mono);font-size:11px;border:1px solid var(--paper);background:transparent;color:var(--paper);
    border-radius:6px;padding:4px 10px;cursor:pointer;}
  .selbar #bundleSel{background:var(--paper);color:var(--ink);}
  .bundle{position:absolute;min-width:170px;background:var(--paper-deep);border:1px dashed var(--graphite);
    border-radius:10px;padding:4px;cursor:grab;z-index:2;}
  .bundle.dragging{cursor:grabbing;opacity:.9;z-index:7;}
  .bundle-head{display:flex;align-items:center;gap:8px;padding:6px 8px;}
  .bundle-head .bname{font-size:13px;font-weight:600;cursor:text;flex:1;word-break:break-word;}
  .bundle-head .bcount{font-family:var(--mono);font-size:10px;color:var(--graphite);background:var(--card);border-radius:5px;padding:1px 6px;}
  .bundle-head .btoggle,.bundle-head .bdel{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:13px;padding:2px;}
  .bundle-head .bdel:hover{color:var(--danger);}
  .bundle.expanded{background:rgba(120,120,120,0.06);border-style:solid;min-width:240px;min-height:110px;}
  .bundle-body{display:flex;flex-direction:column;gap:5px;padding:4px 8px 8px;overflow:auto;max-height:calc(100% - 36px);}
  .bmember{display:flex;align-items:center;gap:7px;background:var(--paper);border:1px solid var(--hair);
    border-left:3px solid var(--upcoming);border-radius:0 7px 7px 0;padding:5px 8px;font-size:12.5px;}
  .bmember.live{border-left-color:var(--live);background:var(--live-soft);}
  .bmember.done{border-left-color:var(--done);opacity:.8;}
  .bmember .bm-tick{flex:0 0 13px;height:13px;border-radius:4px;border:1.5px solid var(--graphite);cursor:pointer;}
  .bmember.done .bm-tick{background:var(--done);border-color:var(--done);}
  .bmember .bm-text{flex:1;cursor:pointer;}
  .bmember.done .bm-text{text-decoration:line-through;color:var(--graphite);}
  .bmember .bm-out{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:12px;}
  .bresize{position:absolute;right:2px;bottom:2px;width:14px;height:14px;cursor:nwse-resize;
    background:linear-gradient(135deg,transparent 50%,var(--graphite) 50%);border-radius:0 0 8px 0;opacity:.5;}

  .cnote{position:absolute;background:var(--card);border:1px solid var(--hair);border-radius:10px;z-index:3;
    box-shadow:0 6px 16px -10px var(--shadow);overflow:hidden;min-width:120px;}
  /* text notes: invisible until hover/edit (PPT-style) */
  .cnote.text{background:transparent;border:1px solid transparent;box-shadow:none;}
  .cnote.text .note-bar{opacity:0;background:transparent;transition:opacity .12s;}
  .cnote.text:hover{border-color:var(--hair);}
  .cnote.text:hover .note-bar{opacity:1;}
  .cnote.text .note-text:focus{outline:1px dashed var(--live);outline-offset:2px;}
  .cnote .note-bar{display:flex;justify-content:space-between;align-items:center;padding:3px 6px;background:var(--paper-deep);}
  .cnote .note-grip{cursor:grab;color:var(--graphite);font-size:12px;user-select:none;}
  .cnote .note-del{border:none;background:none;cursor:pointer;color:var(--graphite);font-size:15px;line-height:1;}
  .cnote .note-del:hover{color:var(--danger);}
  .cnote.dragging{opacity:.9;z-index:7;}
  .note-text{padding:9px 11px;font-size:13px;outline:none;min-height:40px;white-space:pre-wrap;word-break:break-word;}
  .note-text:empty:before{content:attr(data-ph);color:var(--graphite);opacity:.5;}
  .note-link{display:block;padding:9px 11px;font-size:13px;color:var(--soon);text-decoration:none;word-break:break-all;}
  .note-link:hover{text-decoration:underline;}
  .note-img{display:block;width:100%;height:auto;}
  .note-file{display:flex;gap:6px;align-items:center;padding:11px;font-size:13px;color:var(--ink);text-decoration:none;}
  .note-file:hover{color:var(--soon);}

  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .month-dayname{font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--graphite);
    text-align:center;padding:4px 0;}
  .month-cell{min-height:120px;border:1px solid var(--hair);border-radius:8px;background:var(--card);padding:5px;
    display:flex;flex-direction:column;gap:3px;overflow:hidden;}
  .month-cell.empty{background:transparent;border:none;}
  .month-cell.is-today{border-color:var(--live);box-shadow:0 0 0 2px var(--live-soft);}
  .month-cell .mc-date{font-family:var(--mono);font-size:12px;color:var(--graphite);cursor:pointer;align-self:flex-start;}
  .month-cell.is-today .mc-date{color:var(--live);font-weight:600;}
  .mc-item{font-size:10.5px;padding:2px 5px;border-radius:4px;border-left:2px solid var(--upcoming);background:var(--paper);
    cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;}
  .mc-item.done{text-decoration:line-through;opacity:.6;}
  .mc-item.mc-evt{background:rgba(122,108,174,0.13);border-left-color:#7a6cae;color:#3c3489;}
  .mc-more{font-family:var(--mono);font-size:9.5px;color:var(--graphite);cursor:pointer;padding-left:5px;}
  .mc-more:hover{color:var(--live);}
  .canvas-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;
    gap:10px;color:var(--graphite);font-family:var(--mono);font-size:13px;pointer-events:none;z-index:1;}

  .capture{max-width:none;display:flex;gap:8px;margin-bottom:16px;}
  .capture input{flex:1;font-family:var(--sans);font-size:14px;border:1px solid var(--hair);border-radius:9px;
    padding:10px 12px;background:var(--card);color:var(--ink);}
  .capture button{font-family:var(--mono);font-size:12px;background:var(--ink);color:var(--paper);border:none;
    border-radius:9px;padding:0 18px;cursor:pointer;}
  .totem.unassigned{border-style:dashed;}
  .totem.unassigned .assign{font-family:var(--mono);font-size:11px;border:1px solid var(--hair);border-radius:6px;
    background:var(--card);color:var(--graphite);max-width:96px;}
  .quickadd{margin-top:6px;width:100%;font-family:var(--sans);font-size:13px;border:1px dashed var(--hair);
    border-radius:8px;padding:7px 9px;background:none;color:var(--ink);}
  .quickadd:focus{outline:none;border-color:var(--live);border-style:solid;}

  .canvas-row{display:flex;gap:14px;align-items:stretch;}
  .canvas-row .canvas{flex:1;}
  .inbox{flex:0 0 220px;border:1px solid var(--hair);border-radius:14px;background:var(--card);display:flex;
    flex-direction:column;max-height:calc(100vh - 230px);}
  .inbox-head{font-family:var(--mono);font-size:11px;letter-spacing:1.5px;color:var(--graphite);padding:12px 14px;
    border-bottom:1px solid var(--hair);}
  .inbox-body{padding:10px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:8px;}
  .inbox-empty{font-family:var(--mono);font-size:11px;color:var(--graphite);text-align:center;padding:20px 6px;line-height:1.5;}
  .inbox-card{border:1px solid var(--hair);border-left:4px solid var(--upcoming);border-radius:0 9px 9px 0;
    padding:8px 10px;background:var(--paper);}
  .inbox-card .ic-t{font-size:13px;font-weight:600;margin-bottom:6px;cursor:pointer;word-break:break-word;}
  .inbox-card .ic-actions{display:flex;gap:4px;}
  .inbox-card .ic-actions button{flex:1;font-family:var(--mono);font-size:10px;border:1px solid var(--hair);
    background:var(--card);border-radius:6px;padding:3px;cursor:pointer;color:var(--graphite);}
  .inbox-card .ic-actions button[data-s="live"]:hover{border-color:var(--live);color:var(--live);}
  .inbox-card .ic-actions button[data-s="done"]:hover{border-color:var(--done);color:#0F6E56;}
  .inbox-add{margin:10px;font-family:var(--sans);font-size:12px;border:1px dashed var(--hair);border-radius:8px;
    padding:7px 9px;background:none;color:var(--ink);}
  .inbox-add:focus{outline:none;border-color:var(--live);border-style:solid;}
  @media (max-width:760px){.canvas-row{flex-direction:column;}.inbox{flex:1 1 auto;max-height:260px;}}

  /* ---- task editor drawer ---- */
  .drawer-back{position:fixed;inset:0;background:rgba(35,32,27,0.3);z-index:40;display:none;}
  .drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:92vw;background:var(--card);z-index:41;
    box-shadow:-12px 0 40px -16px rgba(0,0,0,.35);transform:translateX(100%);transition:transform .22s ease;
    display:flex;flex-direction:column;}
  .drawer.open{transform:translateX(0);}
  .drawer header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid var(--hair);}
  .drawer header b{font-family:var(--mono);font-size:13px;letter-spacing:.5px;text-transform:uppercase;color:var(--graphite);}
  .drawer header button{border:none;background:none;font-size:22px;cursor:pointer;color:var(--graphite);line-height:1;}
  .drawer header button:hover{color:var(--danger);}
  .drawer .body{padding:18px;overflow-y:auto;display:flex;flex-direction:column;gap:14px;}
  .field label{display:block;font-family:var(--mono);font-size:10px;letter-spacing:1px;text-transform:uppercase;
    color:var(--graphite);margin-bottom:5px;}
  .field input,.field select,.field textarea{width:100%;font-family:var(--sans);font-size:14px;border:1px solid var(--hair);
    border-radius:9px;padding:9px 11px;background:var(--paper);color:var(--ink);}
  .field textarea{resize:vertical;min-height:70px;}
  .field.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .statusseg{display:flex;gap:6px;}
  .statusseg button{flex:1;font-family:var(--mono);font-size:11px;border:1px solid var(--hair);background:var(--paper);
    border-radius:8px;padding:8px;cursor:pointer;color:var(--graphite);text-transform:uppercase;}
  .statusseg button.on[data-s="upcoming"]{background:var(--upcoming);color:#fff;border-color:var(--upcoming);}
  .statusseg button.on[data-s="live"]{background:var(--live);color:#fff;border-color:var(--live);}
  .statusseg button.on[data-s="done"]{background:var(--done);color:#fff;border-color:var(--done);}
  .drawer .foot{margin-top:auto;padding:14px 18px;border-top:1px solid var(--hair);display:flex;justify-content:space-between;}

// urgency derived from a task's due date: overdue/today, soon(<=2d), later(<=7d), calm
function urgencyOf(t){
  if(!t.date||t.status==="done")return "calm";
  const today=fromISO(todayISO()), due=fromISO(t.date);
  const days=Math.round((due-today)/86400000);
  if(days<=0)return "over";
  if(days<=2)return "urgent";
  if(days<=7)return "soon";
  return "calm";
}
const URG_COLOR={over:"#c0392b",urgent:"#e08a1e",soon:"#5b8fc9",calm:"#e3e6ea"};

  if(!t.date)return "";

  const days=Math.round((due-today)/86400000);

  if(days===0)return "today";

  // carry over older data if present

}

/* Supabase Storage upload → returns public URL */
const STORAGE_BUCKET="Chronicle Lite";
async function uploadFile(file){
  const safe=file.name.replace(/[^a-zA-Z0-9._-]/g,"_");
  const path=Date.now()+"_"+Math.random().toString(36).slice(2,7)+"_"+safe;
  const res=await fetch(SUPABASE_URL+"/storage/v1/object/"+encodeURIComponent(STORAGE_BUCKET)+"/"+encodeURIComponent(path),{
    method:"POST",
    headers:{"apikey":SUPABASE_ANON,"Authorization":"Bearer "+SUPABASE_ANON,"Content-Type":file.type||"application/octet-stream"},
    body:file
  });
  if(!res.ok)throw new Error("upload "+res.status+" "+(await res.text()).slice(0,120));
  return SUPABASE_URL+"/storage/v1/object/public/"+encodeURIComponent(STORAGE_BUCKET)+"/"+encodeURIComponent(path);
}

let syncState="starting",pushTimer=null,syncedOnce=false;
function setSync(s,msg){syncState=s;const pill=document.getElementById("syncPill");
  pill.className="sync "+s;document.getElementById("syncText").textContent=msg||s;}
function pushSoon(){clearTimeout(pushTimer);pushTimer=setTimeout(syncNow,800);}
async function upsert(table,rows){if(!rows.length)return;
  const res=await fetch(REST+"/"+table,{method:"POST",
    headers:{...HEADERS,"Prefer":"resolution=merge-duplicates,return=minimal"},body:JSON.stringify(rows)});
  if(!res.ok)throw new Error(table+" push "+res.status+" "+(await res.text()).slice(0,160));}
async function pull(table,since){
  const url=REST+"/"+table+"?select=*&updated_at=gt."+since+"&order=updated_at.asc";
  const res=await fetch(url,{headers:HEADERS});
  if(!res.ok)throw new Error(table+" pull "+res.status+" "+(await res.text()).slice(0,160));
  return res.json();}
async function syncNow(){
  if(!navigator.onLine){setSync("offline","offline · saved locally");return;}
  try{
    setSync("syncing","syncing");
    const pRows=Object.values(db.projects).map(p=>({id:p.id,name:p.name??"",color:p.color??"#888",
      created:p.created??p.updated_at??now(),updated_at:p.updated_at??now(),deleted:!!p.deleted}));
    const tRows=Object.values(db.tasks).map(t=>({id:t.id,project_id:t.project_id??null,text:t.text??"",
      status:t.status??"upcoming",date:t.date??null,category:t.category??"",location:t.location??"",
      notes:t.notes??"",due_time:t.due_time??"",importance:t.importance??"med",done_at:t.done_at??null,x:Math.round(t.x??40),y:Math.round(t.y??40),
      updated_at:t.updated_at??now(),deleted:!!t.deleted}));
    await upsert("projects",pRows);
    await upsert("tasks",tRows);
    const cRows=Object.values(db.categories).map(c=>({id:c.id,name:c.name??"",color:c.color??"#888",
      updated_at:c.updated_at??now(),deleted:!!c.deleted}));
    const aRows=Object.values(db.arrows).map(a=>({id:a.id,project_id:a.project_id??null,
      from_id:a.from,to_id:a.to,updated_at:a.updated_at??now(),deleted:!!a.deleted}));
    const eRows=Object.values(db.events).map(e=>({id:e.id,title:e.title??"",date:e.date??null,
      start:e.start??"09:00",end:e.end??"10:00",project_id:e.project_id??null,location:e.location??"",
      notes:e.notes??"",x:Math.round(e.x??40),y:Math.round(e.y??40),updated_at:e.updated_at??now(),deleted:!!e.deleted}));
    await upsert("categories",cRows);
    await upsert("arrows",aRows);
    await upsert("events",eRows);
    const bRows=Object.values(db.bundles).map(b=>({id:b.id,project_id:b.project_id??null,name:b.name??"",
      task_ids:JSON.stringify(b.task_ids||[]),collapsed:!!b.collapsed,x:Math.round(b.x??60),y:Math.round(b.y??60),
      w:Math.round(b.w??280),h:Math.round(b.h??200),updated_at:b.updated_at??now(),deleted:!!b.deleted}));
    await upsert("bundles",bRows);
    const nRows=Object.values(db.notes).map(n=>({id:n.id,project_id:n.project_id??null,kind:n.kind??"text",
      text:n.text??"",url:n.url??"",filename:n.filename??"",x:Math.round(n.x??80),y:Math.round(n.y??80),
      w:Math.round(n.w??220),h:Math.round(n.h??120),updated_at:n.updated_at??now(),deleted:!!n.deleted}));
    await upsert("notes",nRows);
    const since=db.lastPull||0;
    const[sp,st,sc,sa,se,sb,sn]=await Promise.all([pull("projects",since),pull("tasks",since),
      pull("categories",since),pull("arrows",since),pull("events",since),pull("bundles",since),pull("notes",since)]);
    let changed=false,maxTs=since;
    const merge=(store,row)=>{maxTs=Math.max(maxTs,row.updated_at||0);const cur=store[row.id];
      if(!cur||(row.updated_at||0)>(cur.updated_at||0)){store[row.id]=row;changed=true;}};
    sp.forEach(r=>merge(db.projects,r));st.forEach(r=>merge(db.tasks,r));
    sc.forEach(r=>merge(db.categories,r));
    sa.forEach(r=>{const norm={id:r.id,project_id:r.project_id,from:r.from_id,to:r.to_id,
      updated_at:r.updated_at,deleted:r.deleted};merge(db.arrows,norm);});
    se.forEach(r=>merge(db.events,r));
    sb.forEach(r=>{const norm={id:r.id,project_id:r.project_id,name:r.name,
      task_ids:(()=>{try{return JSON.parse(r.task_ids||"[]")}catch(e){return[]}})(),
      collapsed:r.collapsed,x:r.x,y:r.y,w:r.w,h:r.h,updated_at:r.updated_at,deleted:r.deleted};merge(db.bundles,norm);});
    sn.forEach(r=>merge(db.notes,r));
    db.lastPull=maxTs;persist();
    if(changed&&!dragging)render();
    setSync("online","synced");
    if(!syncedOnce){syncedOnce=true;maybeSeedExample();}
  }catch(e){console.error(e);setSync("error","sync error · saved locally");}
}

const WORLD_W=3200, WORLD_H=2400;
function vpOf(pid){if(!db.viewports[pid])db.viewports[pid]={z:1,px:0,py:0};return db.viewports[pid];}
function minZoomFor(pid){const cv=document.getElementById("canvas");if(!cv)return 0.45;
  // world must always cover the viewport in both axes so bands never stop short
  const need=Math.max(cv.clientWidth/WORLD_W,cv.clientHeight/WORLD_H);
  return Math.max(0.45,need);}
function clampPan(pid){const cv=document.getElementById("canvas");if(!cv)return;const v=vpOf(pid);
  const sw=WORLD_W*v.z,sh=WORLD_H*v.z;
  // keep world covering the viewport: px in [cw-sw, 0], py in [ch-sh, 0]
  const minX=Math.min(0,cv.clientWidth-sw),minY=Math.min(0,cv.clientHeight-sh);
  v.px=Math.max(minX,Math.min(0,v.px));v.py=Math.max(minY,Math.min(0,v.py));}
function applyViewport(pid){const world=document.getElementById("world");if(!world)return;const v=vpOf(pid);
  const mz=minZoomFor(pid);if(v.z<mz)v.z=mz;
  clampPan(pid);
  world.style.transform=`translate(${v.px}px,${v.py}px) scale(${v.z})`;
  const cv=document.getElementById("canvas");if(cv)cv.classList.toggle("zoomed-out",v.z<0.7);}
function setZoom(pid,z){const v=vpOf(pid);v.z=Math.max(minZoomFor(pid),Math.min(1.6,z));persist();
  const inp=document.querySelector(".zoomctl input");if(inp)inp.value=Math.round(v.z*100);
  applyViewport(pid);drawArrows(pid);}
function fitView(pid){const v=vpOf(pid);v.z=Math.max(minZoomFor(pid),1);v.px=0;v.py=0;persist();applyViewport(pid);drawArrows(pid);
  const inp=document.querySelector(".zoomctl input");if(inp)inp.value=Math.round(v.z*100);}
function enableCanvasPanZoom(pid){
  const canvas=document.getElementById("canvas");if(!canvas||canvas._wired)return;canvas._wired=true;
  canvas.addEventListener("wheel",e=>{e.preventDefault();const v=vpOf(pid);
    if(e.ctrlKey||e.metaKey){setZoom(pid,v.z-e.deltaY*0.002);}
    else{v.px-=e.deltaX;v.py-=e.deltaY;clampPan(pid);persist();applyViewport(pid);}},{passive:false});
  canvas.addEventListener("mousedown",e=>{
    if(e.target!==canvas&&e.target.id!=="world"&&!e.target.classList.contains("band"))return;
    if(arrowFrom)return;const v=vpOf(pid);const sx=e.clientX,sy=e.clientY,opx=v.px,opy=v.py;
    const mv=ev=>{v.px=opx+(ev.clientX-sx);v.py=opy+(ev.clientY-sy);clampPan(pid);applyViewport(pid);};
    const up=()=>{persist();drawArrows(pid);document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);};
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);});
  let pinchD=0;
  canvas.addEventListener("touchmove",e=>{if(e.touches.length===2){e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    if(pinchD)setZoom(pid,vpOf(pid).z*(d/pinchD));pinchD=d;}},{passive:false});
  canvas.addEventListener("touchend",()=>{pinchD=0;});
}

function arrowNodeFor(id){
  return document.getElementById("card_"+id)||document.getElementById("note_"+id)||document.getElementById("bundle_"+id);
}
// In arrow mode, clicking any canvas item picks source then target. Returns true if handled.
function handleArrowClick(pid,id,e){
  if(!arrowFrom)return false;
  e.preventDefault();e.stopPropagation();
  if(arrowFrom==="_arm"){arrowFrom=id;render();}
  else if(arrowFrom===id){arrowFrom=null;render();}
  else{newArrow(pid,arrowFrom,id);arrowFrom=null;render();}

function drawArrows(pid){const svg=document.getElementById("arrowlayer");if(!svg)return;
  svg.querySelectorAll("path.arrow").forEach(n=>n.remove());
  arrowsOf(pid).forEach(a=>{
    const ce=arrowNodeFor(a.from),te=arrowNodeFor(a.to);
    if(!ce||!te)return;
    const c1={x:ce.offsetLeft+ce.offsetWidth/2,y:ce.offsetTop+ce.offsetHeight/2};
    const c2={x:te.offsetLeft+te.offsetWidth/2,y:te.offsetTop+te.offsetHeight/2};
    const start=edgePoint(c1,c2,ce.offsetWidth/2,ce.offsetHeight/2);
    const end=edgePoint(c2,c1,te.offsetWidth/2+3,te.offsetHeight/2+3);
    const mx=(start.x+end.x)/2;
    const path=document.createElementNS("http://www.w3.org/2000/svg","path");
    path.setAttribute("d",`M ${start.x} ${start.y} C ${mx} ${start.y}, ${mx} ${end.y}, ${end.x} ${end.y}`);
    path.setAttribute("class","arrow");path.setAttribute("fill","none");
    path.setAttribute("stroke","#7a746a");path.setAttribute("stroke-width","2");
    path.setAttribute("marker-end","url(#ah)");path.style.pointerEvents="stroke";path.style.cursor="pointer";
    path.addEventListener("click",()=>{if(confirm("Delete this arrow?")){delArrow(a);render();}});
    svg.appendChild(path);
  });}
function edgePoint(c,t,hw,hh){
  const dx=t.x-c.x,dy=t.y-c.y;
  if(dx===0&&dy===0)return{x:c.x,y:c.y};
  const sx=dx!==0?hw/Math.abs(dx):Infinity;
  const sy=dy!==0?hh/Math.abs(dy):Infinity;
  const s=Math.min(sx,sy);
  return{x:c.x+dx*s,y:c.y+dy*s};
}

function enableDrag(c,t,p){
  if(selected.has(t.id))c.classList.add("selected");

    if(e.target.classList.contains("cstatus"))return;

      else if(arrowFrom===t.id){arrowFrom=null;render();}
      else{newArrow(p.id,arrowFrom,t.id);arrowFrom=null;render();}
      return;}
    // shift/ctrl-click toggles selection instead of dragging
    if(e.shiftKey||e.ctrlKey||e.metaKey){e.preventDefault();
      selected.has(t.id)?selected.delete(t.id):selected.add(t.id);
      c.classList.toggle("selected");updateSelBar();return;}
    e.preventDefault();e.stopPropagation();
    const pt=e.touches?e.touches[0]:e;const z=vpOf(p.id).z;
    let sx=pt.clientX,sy=pt.clientY,ox=t.x??40,oy=t.y??40,moved=false,mergeTarget=null,hoverStart=0;
    dragging=true;c.classList.add("dragging");

      if(Math.abs(dx)+Math.abs(dy)>3)moved=true;

      c.style.left=nx+"px";c.style.top=ny+"px";t._nx=nx;t._ny=ny;
      if(moved)drawArrows(p.id);

      c.style.pointerEvents="none";
      const under=document.elementFromPoint(pt.clientX,pt.clientY);
      c.style.pointerEvents="";
      const card=under&&under.closest&&under.closest(".ccard");
      const bun=under&&under.closest&&under.closest(".bundle");
      const newTarget=(card&&card!==c&&card.id.startsWith("card_"))?card:(bun||null);
      if(newTarget!==mergeTarget){if(mergeTarget)mergeTarget.classList.remove("merge-hover");
        mergeTarget=newTarget;hoverStart=Date.now();if(mergeTarget)mergeTarget.classList.add("merge-hover");}
      if(e.cancelable)e.preventDefault();};
    const up=()=>{dragging=false;c.classList.remove("dragging");
      document.removeEventListener("mousemove",move);document.removeEventListener("mouseup",up);
      document.removeEventListener("touchmove",move);document.removeEventListener("touchend",up);
      if(mergeTarget)mergeTarget.classList.remove("merge-hover");
      if(moved){
        // drag-to-merge: dropped on a bundle, or on another card (held >500ms) → bundle them
        if(mergeTarget&&mergeTarget.id.startsWith("bundle_")&&Date.now()-hoverStart>400){
          const b=bundleById(mergeTarget.id.slice(7));if(b){addToBundle(b,t.id);render();return;}}
        if(mergeTarget&&mergeTarget.id.startsWith("card_")&&Date.now()-hoverStart>500){
          const otherId=mergeTarget.id.slice(5);
          if(db.tasks[otherId]){const name=prompt("Name this bundle","Bundle");if(name!==null){
            newBundle(p.id,name||"Bundle",[otherId,t.id],db.tasks[otherId].x,db.tasks[otherId].y);render();return;}}}
        const cardMid=(t._ny??oy)+c.offsetHeight/(2*z);
        const newStatus=statusForY(cardMid,WORLD_H);
        t.x=Math.round(t._nx);t.y=Math.round(t._ny);delete t._nx;delete t._ny;
        if(newStatus!==t.status){setStatus(t,newStatus);if(newStatus==="live"&&!t.date)t.date=todayISO();}
        touchTask(t);
      } else {openTask(t.id);}};
    document.addEventListener("mousemove",move);document.addEventListener("mouseup",up);
    document.addEventListener("touchmove",move,{passive:false});document.addEventListener("touchend",up);};
  c.addEventListener("mousedown",down);c.addEventListener("touchstart",down,{passive:false});
}
function tidy(pid){const bands=bandTops(WORLD_H);const cols=Math.max(1,Math.floor((WORLD_W-60)/235));
  const counters={done:0,live:0,upcoming:0};
  tasksOf(pid).filter(t=>t.status!=="pending"&&!collapsedMember(t)).forEach(t=>{const i=counters[t.status]++;const b=bands[t.status];
    t.x=40+(i%cols)*235;t.y=Math.round(b.top+44+Math.floor(i/cols)*120);t.updated_at=now();});
  persist();render();pushSoon();}
function collapsedMember(t){return t.bundle_id&&bundleById(t.bundle_id)&&!bundleById(t.bundle_id).deleted&&bundleById(t.bundle_id).collapsed;}

// drag a calendar block (task or event) to a new time; commits via setter(newStartMins,durationMins)
function enableTimeDrag(el,startMins,durMins,colHeightPerMin,onCommit){
  let sy,oy,moved;
  const down=e=>{if(e.target.closest(".ev-resize"))return;e.preventDefault();
    const pt=e.touches?e.touches[0]:e;sy=pt.clientY;oy=startMins;moved=false;dragging=true;el.classList.add("dragging");
    document.addEventListener("mousemove",mv);document.addEventListener("mouseup",up);
    document.addEventListener("touchmove",mv,{passive:false});document.addEventListener("touchend",up);};
  const mv=e=>{const pt=e.touches?e.touches[0]:e;const dy=pt.clientY-sy;if(Math.abs(dy)>3)moved=true;
    const newStart=oy+dy/colHeightPerMin;el.style.top=((newStart-DAY_START*60)*colHeightPerMin)+"px";
    el._ns=newStart;if(e.cancelable)e.preventDefault();};
  const up=()=>{dragging=false;el.classList.remove("dragging");
    document.removeEventListener("mousemove",mv);document.removeEventListener("mouseup",up);
    document.removeEventListener("touchmove",mv);document.removeEventListener("touchend",up);
    if(moved){onCommit(Math.round((el._ns??oy)));}else{el._click&&el._click();}};
  el.addEventListener("mousedown",down);el.addEventListener("touchstart",down,{passive:false});
}

function dayGrid(iso,rows){
  const timed=rows.filter(r=>r.t.due_time);
  const allday=rows.filter(r=>!r.t.due_time);
  const evs=eventsForDate(iso);
  const cal=document.createElement("div");cal.className="cal";
  const ad=document.createElement("div");ad.className="allday";
  ad.innerHTML=`<div class="ad-label">all-day</div><div class="ad-items"></div>`;
  const adi=ad.querySelector(".ad-items");
  if(!allday.length)adi.innerHTML=`<span class="ad-empty">—</span>`;
  allday.forEach(({t,p})=>{const c=document.createElement("div");c.className="ad-chip"+(t.status==="done"?" done":"");
    c.style.borderLeftColor=p.color;c.textContent=t.text;c.title=p.name;
    c.addEventListener("click",()=>openTask(t.id));adi.appendChild(c);});
  cal.appendChild(ad);
  const grid=document.createElement("div");grid.className="hourgrid";
  grid.style.height=((DAY_END-DAY_START)*HOUR_PX)+"px";
  for(let h=DAY_START;h<=DAY_END;h++){const row=document.createElement("div");row.className="hourline";
    row.style.top=((h-DAY_START)*HOUR_PX)+"px";
    row.innerHTML=`<span class="hourlbl">${String(h).padStart(2,"0")}:00</span>`;grid.appendChild(row);}
  if(iso===todayISO()){const d=new Date();const mins=d.getHours()*60+d.getMinutes();
    if(mins>=DAY_START*60&&mins<=DAY_END*60){const nl=document.createElement("div");nl.className="nowline";
      nl.style.top=((mins-DAY_START*60)/60*HOUR_PX)+"px";grid.appendChild(nl);}}
  // events first (behind tasks), styled distinctly
  evs.forEach(ev=>{const sm=hm(ev.start),em=hm(ev.end);const top=(sm-DAY_START*60)/60*HOUR_PX;
    const h=Math.max(22,((em-sm)/60*HOUR_PX));
    const block=document.createElement("div");block.className="cal-eventblock";
    block.style.top=Math.max(0,top)+"px";block.style.height=h+"px";
    const p=ev.project_id&&projById(ev.project_id);if(p)block.style.boxShadow=`inset 4px 0 0 ${p.color}`;
    block.innerHTML=`<b>${ev.start}–${ev.end}</b> ${esc(ev.title)}${ev.location?` · ${esc(ev.location)}`:""}`;
    block._click=()=>openEvent(ev.id);
    enableTimeDrag(block,sm,em-sm,HOUR_PX/60,(newStart)=>{const dur=em-sm;
      ev.start=minsToTime(newStart);ev.end=minsToTime(newStart+dur);touchEvent(ev);});
    grid.appendChild(block);});
  // timed tasks
  timed.forEach(({t,p})=>{const mins=minutesOf(t);const top=(mins-DAY_START*60)/60*HOUR_PX;
    const ev=document.createElement("div");ev.className="event"+(t.status==="done"?" done":"");
    ev.style.top=Math.max(0,top)+"px";ev.style.borderLeftColor=p.color;ev.style.background=p.color+"1a";
    ev.innerHTML=`<b>${t.due_time}</b> ${esc(t.text)}`;ev.title=p.name;
    ev._click=()=>openTask(t.id);
    enableTimeDrag(ev,mins,60,HOUR_PX/60,(newStart)=>{t.due_time=minsToTime(newStart);touchTask(t);});
    grid.appendChild(ev);});
  cal.appendChild(grid);
  return cal;
}

        tt.addEventListener("click",()=>openTask(t.id));col.appendChild(tt);});
      eventsForDate(iso).forEach(ev=>{const tt=document.createElement("div");tt.className="wtask wevt";
        tt.textContent=ev.start+" "+ev.title;tt.addEventListener("click",()=>openEvent(ev.id));col.appendChild(tt);});
      grid.appendChild(col);}
    wrap.appendChild(grid);
  } else {
    const cal=document.createElement("div");cal.className="weekcal";
    const hdr=document.createElement("div");hdr.className="weekcal-hdr";
    hdr.innerHTML=`<div class="wc-corner"></div>`;
    for(let i=0;i<7;i++){const iso=addDays(start,i);const d=document.createElement("div");
      d.className="wc-dayname"+(iso===todayISO()?" is-today":"");
      d.innerHTML=`${names[i]} <b>${fromISO(iso).getDate()}</b>`;hdr.appendChild(d);}
    cal.appendChild(hdr);
    const adrow=document.createElement("div");adrow.className="weekcal-allday";
    adrow.innerHTML=`<div class="wc-adlabel">all-day</div>`;
    for(let i=0;i<7;i++){const iso=addDays(start,i);const cell=document.createElement("div");cell.className="wc-adcell";
      dayRows(iso).filter(r=>!r.t.due_time).forEach(({t,p})=>{const c=document.createElement("div");
        c.className="ad-chip"+(t.status==="done"?" done":"");c.style.borderLeftColor=p.color;c.textContent=t.text;c.title=p.name;
        c.addEventListener("click",()=>openTask(t.id));cell.appendChild(c);});
      adrow.appendChild(cell);}
    cal.appendChild(adrow);
    const body=document.createElement("div");body.className="weekcal-body";
    const gutter=document.createElement("div");gutter.className="wc-gutter";
    gutter.style.height=((DAY_END-DAY_START)*HOUR_PX)+"px";
    for(let h=DAY_START;h<=DAY_END;h++){const l=document.createElement("div");l.className="wc-hourlbl";
      l.style.top=((h-DAY_START)*HOUR_PX)+"px";l.textContent=String(h).padStart(2,"0")+":00";gutter.appendChild(l);}
    body.appendChild(gutter);
    for(let i=0;i<7;i++){const iso=addDays(start,i);const col=document.createElement("div");
      col.className="wc-col"+(iso===todayISO()?" is-today":"");
      col.style.height=((DAY_END-DAY_START)*HOUR_PX)+"px";
      for(let h=DAY_START;h<=DAY_END;h++){const ln=document.createElement("div");ln.className="wc-hline";
        ln.style.top=((h-DAY_START)*HOUR_PX)+"px";col.appendChild(ln);}
      // events behind tasks
      eventsForDate(iso).forEach(ev=>{const sm=hm(ev.start),em=hm(ev.end);const top=(sm-DAY_START*60)/60*HOUR_PX;
        const hh=Math.max(18,(em-sm)/60*HOUR_PX);const block=document.createElement("div");block.className="wc-eventblock";
        block.style.top=Math.max(0,top)+"px";block.style.height=hh+"px";
        block.innerHTML=`<b>${ev.start}</b>${esc(ev.title)}`;block._click=()=>openEvent(ev.id);
        enableTimeDrag(block,sm,em-sm,HOUR_PX/60,(newStart)=>{const dur=em-sm;
          ev.start=minsToTime(newStart);ev.end=minsToTime(newStart+dur);touchEvent(ev);});
        col.appendChild(block);});
      dayRows(iso).filter(r=>r.t.due_time).forEach(({t,p})=>{const mins=minutesOf(t);
        const top=(mins-DAY_START*60)/60*HOUR_PX;const ev=document.createElement("div");
        ev.className="wc-event"+(t.status==="done"?" done":"");ev.style.top=Math.max(0,top)+"px";
        ev.style.borderLeftColor=p.color;ev.style.background=p.color+"1a";
        ev.innerHTML=`<b>${t.due_time}</b> ${esc(t.text)}`;ev.title=p.name;
        ev._click=()=>openTask(t.id);
        enableTimeDrag(ev,mins,60,HOUR_PX/60,(newStart)=>{t.due_time=minsToTime(newStart);touchTask(t);});
        col.appendChild(ev);});
      if(iso===todayISO()){const d=new Date();const mins=d.getHours()*60+d.getMinutes();
        if(mins>=DAY_START*60&&mins<=DAY_END*60){const nl=document.createElement("div");nl.className="nowline";
          nl.style.top=((mins-DAY_START*60)/60*HOUR_PX)+"px";col.appendChild(nl);}}
      body.appendChild(col);}
    cal.appendChild(body);
    wrap.appendChild(cal);
  }
  app.replaceChildren(wrap);
}
function renderMonth(){
  const cur=fromISO(db.cursorDate);const y=cur.getFullYear(),m=cur.getMonth();
  const first=new Date(y,m,1);const startOff=(first.getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(y,m+1,0).getDate();
  const wrap=document.createElement("div");wrap.className="timeline";wrap.style.maxWidth="1100px";
  const head=document.createElement("div");head.className="week-head";
  head.innerHTML=`<div class="nav"><button data-d="-1">‹</button><button data-d="1">›</button></div>
    <h2>${first.toLocaleDateString(undefined,{month:'long',year:'numeric'})}</h2>
    <button class="today-pill">this month</button>`;
  head.querySelectorAll(".nav button").forEach(b=>b.addEventListener("click",()=>{
    db.cursorDate=toISO(new Date(y,m+(+b.dataset.d),1));render();}));
  head.querySelector(".today-pill").addEventListener("click",()=>{db.cursorDate=todayISO();render();});
  wrap.appendChild(head);
  wrap.appendChild(catControlBar());
  const grid=document.createElement("div");grid.className="month-grid";
  const names=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  names.forEach(n=>{const h=document.createElement("div");h.className="month-dayname";h.textContent=n;grid.appendChild(h);});
  // leading blanks
  for(let i=0;i<startOff;i++){const c=document.createElement("div");c.className="month-cell empty";grid.appendChild(c);}
  for(let d=1;d<=daysInMonth;d++){const iso=toISO(new Date(y,m,d));const cell=document.createElement("div");
    cell.className="month-cell"+(iso===todayISO()?" is-today":"");
    cell.innerHTML=`<div class="mc-date">${d}</div>`;
    const items=applyCatControls(tasksForDate(iso));
    const evs=eventsForDate(iso);
    evs.slice(0,2).forEach(ev=>{const e=document.createElement("div");e.className="mc-item mc-evt";
      e.textContent=ev.start+" "+ev.title;e.addEventListener("click",()=>openEvent(ev.id));cell.appendChild(e);});
    items.slice(0,3).forEach(({t,p})=>{const e=document.createElement("div");e.className="mc-item"+(t.status==="done"?" done":"");
      e.style.borderLeftColor=p.color;e.textContent=(t.due_time?t.due_time+" ":"")+t.text;
      e.addEventListener("click",()=>openTask(t.id));cell.appendChild(e);});
    const extra=(items.length-3)+(evs.length-2);
    const more=(items.length>3?items.length-3:0)+(evs.length>2?evs.length-2:0);
    if(more>0){const e=document.createElement("div");e.className="mc-more";e.textContent="+"+more+" more";
      e.addEventListener("click",()=>{db.cursorDate=iso;db.view="day";render();});cell.appendChild(e);}
    cell.querySelector(".mc-date").addEventListener("click",()=>{db.cursorDate=iso;db.view="day";render();});
    grid.appendChild(cell);}
  wrap.appendChild(grid);
  app.replaceChildren(wrap);
}
function esc(s){return(s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

document.querySelectorAll(".views button").forEach(b=>b.addEventListener("click",()=>{db.openProject=null;db.view=b.dataset.view;render();}));
document.getElementById("brandHome").addEventListener("click",()=>{db.openProject=null;db.view="projects";render();});

/* ===== PWA ===== */
let deferredPrompt=null;
window.addEventListener("beforeinstallprompt",e=>{e.preventDefault();deferredPrompt=e;
  const b=document.getElementById("installBtn");b.style.display="inline-block";
  b.onclick=async()=>{b.style.display="none";deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;};});
function buildManifest(){try{
  const icon='data:image/svg+xml,'+encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#23201b"/><rect x="56" y="40" width="80" height="28" rx="8" fill="#9aae9a"/><rect x="56" y="82" width="80" height="28" rx="8" fill="#d98a2b"/><rect x="56" y="124" width="80" height="28" rx="8" fill="#b7ab93"/></svg>');
  const m={name:"Chronicle",short_name:"Chronicle",start_url:location.href,display:"standalone",background_color:"#f3efe6",theme_color:"#23201b",icons:[{src:icon,sizes:"192x192",type:"image/svg+xml",purpose:"any"}]};
  const url=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:"application/manifest+json"}));
  document.getElementById("manifestLink").setAttribute("href",url);
}catch(e){}}
function registerSW(){try{
  if(!("serviceWorker"in navigator))return;
  if(location.protocol!=="https:"&&location.hostname!=="localhost")return;
  const sw=`const C="chronicle-v10";
    self.addEventListener("install",e=>self.skipWaiting());
    self.addEventListener("activate",e=>self.clients.claim());
    self.addEventListener("fetch",e=>{
      const u=new URL(e.request.url);
      if(u.hostname.endsWith("supabase.co"))return;
      if(e.request.method!=="GET")return;
      // network-first: always try fresh, fall back to cache when offline
      e.respondWith(
        fetch(e.request).then(net=>{if(net&&net.ok){const cp=net.clone();caches.open(C).then(c=>c.put(e.request,cp));}return net;})
        .catch(()=>caches.open(C).then(c=>c.match(e.request)))
      );
    });`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"text/javascript"}))).then(reg=>{
    // when a new worker takes over, reload once to show the fresh version
    let reloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange",()=>{if(reloaded)return;reloaded=true;location.reload();});
    setInterval(()=>reg.update(),60000);
  }).catch(()=>{});
}catch(e){}}

/* ===== BOOT ===== */
function applyTheme(){const th=localStorage.getItem("chronicle.theme")||"light";
  document.documentElement.setAttribute("data-theme",th);}
document.getElementById("themeBtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme")==="dark"?"light":"dark";
  localStorage.setItem("chronicle.theme",cur);document.documentElement.setAttribute("data-theme",cur);});
document.getElementById("resetBtn").addEventListener("click",async()=>{
  if(!confirm("Wipe ALL data on this device AND the server, and start fresh? This cannot be undone."))return;
  if(!confirm("Really wipe everything? Last chance."))return;
  // hard-delete every row on the server, then clear local
  try{
    for(const tbl of ["tasks","projects","categories","arrows","events","bundles","notes"]){
      await fetch(REST+"/"+tbl+"?id=neq.__none__",{method:"DELETE",headers:HEADERS});
    }
  }catch(e){}
  try{localStorage.removeItem(LKEY);localStorage.removeItem("chronicle.seeded");}catch(e){}
  db=emptyLocal();db.lastPull=0;persist();
  location.reload();
});
function boot(){
  applyTheme();
  try{render();}catch(e){const b=document.getElementById("cfgBanner");b.style.display="block";
    b.textContent="Startup error: "+e.message;console.error(e);}
  setSync(navigator.onLine?"syncing":"offline",navigator.onLine?"syncing":"offline · saved locally");
  buildManifest();registerSW();
  if(navigator.onLine)syncNow();
  setInterval(()=>{if(navigator.onLine&&syncState!=="syncing"&&!dragging&&!editingTaskId)syncNow();},30000);
}
boot();
